name: Validate docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate docs config and OpenAPI spec
        run: npx --yes mint@latest validate

      - name: Guide-claims checker self-test
        run: node eval/check-guide-claims.mjs --self-test

      - name: Eval grader unit tests (node:test)
        # Glob (not a bare `eval/` dir arg): Node 22 tries to execute a bare
        # directory as a module rather than scanning it for test files.
        run: node --test 'eval/**/*.test.mjs'

      - name: Check guide claims against spec
        run: node eval/check-guide-claims.mjs
