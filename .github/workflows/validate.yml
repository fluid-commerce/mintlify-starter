name: Validate docs

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate docs config and OpenAPI spec
        run: npx --yes mint@4.2.731 validate

      - name: Guide-claims checker self-test
        run: node eval/check-guide-claims.mjs --self-test

      - name: Eval harness unit tests
        # `node --test eval/` is not usable on Node 22.x: a bare directory
        # positional is resolved as a module entrypoint, not a scan root. Running
        # the runner with eval/ as the working directory scans it and picks up
        # only *.test.mjs (run-eval.mjs / check-guide-claims.mjs are not test
        # files, so they are never executed as tests).
        working-directory: eval
        run: node --test

      - name: Check guide claims against spec
        run: node eval/check-guide-claims.mjs
