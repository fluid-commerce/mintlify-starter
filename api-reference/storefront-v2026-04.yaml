  /api/v202604/playlists:
    get:
      tags: [storefront]
      summary: List playlists (public storefront catalog)
      operationId: storefrontPlaylistsIndex
      description: |
        PUBLIC endpoint — NO authentication required. Company is resolved from the
        request subdomain. Returns only live playlists: `active == true` (inactive/
        draft playlists are excluded). Cursor-paginated. Supports `lang`, `q`,
        `filter[country]`, `filter[language]`, and `sort`.

        The same payload is available at `/home/libraries.json` on the storefront
        domain for AEO crawlers. `canonical_url` always points at the
        `/home/libraries/:slug` path family on the primary store domain.
      security: []
      parameters:
        - name: lang
          in: query
          schema: { type: string }
          description: ISO locale code. Defaults to the store's default locale. Falls back to `en` for missing translations.
          example: en
        - name: q
          in: query
          schema: { type: string }
          description: Free-text search over title and description (Elasticsearch).
        - name: page[cursor]
          in: query
          schema: { type: string }
          description: Opaque Rotulus cursor from the previous response's `meta.pagination.next_cursor`.
        - name: page[limit]
          in: query
          description: |
            Page size. Default 25, max 100; a larger value returns 422.
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: filter[country]
          in: query
          schema: { type: string }
          description: ISO-2 country code. Returns unrestricted playlists plus those restricted to this country.
          example: GB
        - name: filter[language]
          in: query
          schema: { type: string }
          description: ISO locale. Restricts to playlists translated in this locale.
        - name: sort
          in: query
          schema:
            type: string
            enum: [title, -title, created_at, -created_at]
          description: Sort axis. Prefix `-` for descending. Default is `-created_at`.
      responses:
        "200":
          description: A page of live playlists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v202604/playlists/{slug}:
    get:
      tags: [storefront]
      summary: Show a playlist (public, by slug)
      operationId: storefrontPlaylistShow
      description: |
        PUBLIC endpoint — NO authentication required. Returns any non-discarded
        playlist by slug: `draft`, `inactive`, and live playlists all resolve
        (so preview / pre-launch links work). Only discarded playlists return 404.
        Non-live playlists render with `noindex` metadata. The response uses the
        `:detail` view — includes `library_items` — not the lean catalog card.
      security: []
      parameters:
        - name: slug
          description: The URL slug of the playlist.
          in: path
          required: true
          schema: { type: string }
          example: primex-wellness-playlist
        - name: lang
          in: query
          schema: { type: string }
          description: ISO locale for the response. Falls back to `en`.
      responses:
        "200":
          description: Playlist detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistShowResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v202604/company/playlists:
    get:
      tags: [company]
      summary: List playlists (company, authenticated)
      operationId: companyPlaylistsIndex
      description: |
        Returns ALL company playlists regardless of lifecycle (including inactive/
        draft). Use `filter[status]` or `filter[active]` to narrow. Auth required.
        After each create or update, both Lighthouse and compliance scans are queued
        automatically — a brief `scan_status: pending` on `GET :id/lighthouse` and
        `:id/compliance` immediately after a write is expected.
      security:
        - bearer_auth: []
      parameters:
        - $ref: "#/components/parameters/Lang"
        - name: page[cursor]
          in: query
          description: |
            Opaque Rotulus cursor from the previous response's
            `meta.pagination.next_cursor`.
          schema: { type: string }
        - name: page[limit]
          in: query
          description: |
            Page size. Default 25, max 100; a larger value returns 422.
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
        - name: filter[status]
          in: query
          description: |
            One of `draft`, `scheduled`, or `published`. Restricts the index to a
            single lifecycle state. Company-surface only.
          schema: { type: string, enum: [draft, scheduled, published] }
        - $ref: "#/components/parameters/FilterActive"
        - name: filter[country]
          in: query
          description: |
            ISO-2 country code. Returns unrestricted playlists plus those restricted
            to this country.
          schema: { type: string }
        - name: filter[language]
          in: query
          description: |
            ISO locale. Restricts to playlists translated in this locale.
          schema: { type: string }
        - name: sort
          in: query
          description: |
            Sort axis. Prefix `-` for descending. Default is `-created_at`.
          schema: { type: string, enum: [title, -title, created_at, -created_at] }
      responses:
        "200":
          description: Paginated list of company playlists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    post:
      tags: [company]
      summary: Create a playlist
      operationId: companyPlaylistsCreate
      description: |
        Creates a new playlist. `status: published` sets `active: true`; `status:
        draft` sets `active: false`. Send `slug` + `custom_slug: true` to pin a
        permanent slug; without `custom_slug: true` the slug regenerates on title
        change. After creation, Lighthouse and compliance scans are queued
        automatically. With `lang`, the translatable fields (`title`,
        `description`) are written for that locale; omitting `lang` writes the
        default locale.
      security:
        - bearer_auth: []
      parameters:
        - $ref: "#/components/parameters/LangWrite"
        - $ref: "#/components/parameters/Lang"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistCreateRequest"
            example:
              library:
                title: Primex Wellness Playlist
                description: A curated collection for Primex members.
                status: published
                kind: manual
                country_isos: [GB, US]
      responses:
        "201":
          description: Playlist created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v202604/company/playlists/{id}:
    get:
      tags: [company]
      summary: Show a playlist (company, by id)
      operationId: companyPlaylistShow
      description: |
        With `lang`, translated fields (`title`, `description`) render in that
        locale — use it to read a specific translation before editing it.
      security:
        - bearer_auth: []
      parameters:
        - name: id
          description: The unique identifier of the playlist.
          in: path
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/Lang"
      responses:
        "200":
          description: Playlist detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [company]
      summary: Update a playlist
      operationId: companyPlaylistUpdate
      description: |
        Partial update — only keys present in the payload are changed. After the
        update, Lighthouse and compliance scans are queued automatically. With
        `lang`, the translatable fields (`title`, `description`) are written
        for that locale only — the default-locale copy is untouched; omitting
        `lang` writes the default locale.
      security:
        - bearer_auth: []
      parameters:
        - $ref: "#/components/parameters/LangWrite"
        - name: id
          description: The unique identifier of the playlist.
          in: path
          required: true
          schema: { type: integer }
        - $ref: "#/components/parameters/Lang"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaylistUpdateRequest"
      responses:
        "200":
          description: Updated playlist.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlaylistShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [company]
      summary: Soft-delete a playlist
      operationId: companyPlaylistDestroy
      description: Soft-deletes (discards) the playlist. The slug becomes available for reuse immediately.
      security:
        - bearer_auth: []
      parameters:
        - name: id
          description: The unique identifier of the playlist.
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Playlist deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

