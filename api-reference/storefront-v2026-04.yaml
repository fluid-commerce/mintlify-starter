  /api/v202604/company/products/{id}/lighthouse:
    get:
      tags: [company]
      summary: Latest Lighthouse result
      operationId: companyProductsLighthouseShow
      description: |
        Returns the most recent successful Lighthouse scan for the Product
        (scans persist only on success). A fresh scan is auto-queued on
        every company create and update, but it runs asynchronously — a
        failed, rate-limited, or recently-run rescan writes no new record,
        so this endpoint may return the prior scan with HTTP 200. `POST
        .../lighthouse` requests a rescan (it always returns 202) but
        cannot guarantee a newer score — the queued scan is skipped
        silently when one ran in the last ~5 minutes, the scanner is
        rate-limited, or its circuit breaker is open.
      security:
        - bearer_auth: []
      parameters:
        - name: id
          description: The unique identifier of the product.
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Latest Lighthouse result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LighthouseResult"
        "202":
          description: |
            No Lighthouse scan existed yet; one was triggered
            automatically. Poll `GET :id/lighthouse` for the result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LighthouseScanTriggered"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [company]
      summary: Trigger a Lighthouse scan
      operationId: companyProductsLighthouseScan
      description: |
        Queues a fresh Lighthouse scan. Returns immediately with `202
        Accepted`; the new result lands at `GET :id/lighthouse` when the
        job completes (usually <60s).

        Manual triggers are usually unnecessary — every company create and
        update auto-queues a scan. Use this when an out-of-band change
        (DNS, CDN config, theme deploy) means the Lighthouse score should be
        re-evaluated without a resource write.
      security:
        - bearer_auth: []
      parameters:
        - name: id
          description: The unique identifier of the product.
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Scan accepted and queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanQueued"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

