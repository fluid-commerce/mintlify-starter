    Collection:
      type: object
      description: |
        Storefront Collection. The first thirteen fields are the canonical
        common top shared by every storefront resource in v202604 — same
        names, same order, same types across Categories, Collections,
        Products, Pages, Enrollment Packs, Posts, Media, Playlists.
        Collection adds NO public tail fields (admin metadata like
        `position`, `is_default`, and the legacy `public` flag are kept
        out of the v202604 boundary).
      required:
        [id, slug, title, description, image_url, canonical_url, images,
         active, status, publish_at, seo, metafields, languages, countries]
      properties:
        id:
          type: integer
          description: |
            Numeric identifier for the collection. This is the canonical
            company-surface identifier used to address the row on
            `/api/v202604/company/collections/{id}` endpoints.
          example: 5102
        slug:
          type: string
          description: |
            URL-safe identifier and the canonical public identifier for the
            collection. It matches the row's `canonical_url` and is the key used by
            the public show endpoint (`GET /api/v202604/collections/{slug}`).
          example: wellness-essentials
        title:
          type: string
          description: |
            Human-readable display title of the collection. When the slug is
            auto-generated, it derives from this value.
          example: Wellness Essentials
        description:
          type: [string, "null"]
          description: |
            Optional long-form description of the collection; `null` when unset.
          example: Hand-picked supplements and recovery gear.
        image_url:
          type: [string, "null"]
          description: |
            URL of the collection's primary image, or `null` when it has no image. See
            `images` for responsive renditions.
          example: https://cdn.fluid.app/collections/5102.png
        canonical_url:
          type: string
          description: |
            Absolute canonical storefront URL for the collection, built from its
            current `slug`.
          example: https://acme.fluid.app/home/collections/wellness-essentials
        images:
          $ref: "#/components/schemas/ResponsiveImageSet"
        active:
          type: boolean
          description: |
            Merchant on/off toggle. When false, the Collection is hidden
            from EVERY public surface regardless of `status`.
          example: true
        status:
          type: string
          enum: [draft, scheduled, published, archived]
          description: |
            Lifecycle. The auto-go-live rule applies at read time: a
            stored `scheduled` row whose `publish_at` has passed
            resolves to `published`. "Live" = `active == true` AND
            resolved `status == published`.
          example: published
        publish_at:
          type: [string, "null"]
          format: date-time
          description: |
            Scheduled go-live timestamp (ISO 8601), or `null` when none is set. At
            read time, once `publish_at` has passed a stored `scheduled` row resolves
            to `published` automatically. Models go-live only — there is no
            corresponding unpublish-at timestamp.
          example: null
        seo:
          $ref: "#/components/schemas/Seo"
        metafields:
          type: array
          description: |
            Custom metadata entries (each a `namespace`/`key`/`value` with a
            `value_type`) attached to the collection; empty array when none are set.
          items:
            $ref: "#/components/schemas/Metafield"
        languages:
          type: array
          items:
            type: string
          description: |
            ISO codes of locales this Collection is translated into.
            Always includes the company default locale; never empty.
          example: [en, fr]
        countries:
          type: array
          items:
            type: string
          description: |
            ISO codes restricting availability. Empty array means
            available in every country the company sells in
            (unrestricted).
          example: [GB, US]
        custom_slug:
          type: boolean
          description: |
            Authenticated-only. True when the merchant has pinned a
            permanent merchant-set slug; false when the slug is
            auto-generated from `title` and regenerates on rename.
            Omitted from the public surface — admin metadata about how
            the slug is managed, not something a storefront consumer
            needs.
          example: false
    CollectionListResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required: [collections]
          properties:
            collections:
              type: array
              items:
                $ref: "#/components/schemas/Collection"
            meta:
              allOf:
                - $ref: "#/components/schemas/Meta"
                - required: [pagination]
    CollectionShowResponse:
      allOf:
        - $ref: "#/components/schemas/Envelope"
        - type: object
          required: [collection]
          properties:
            collection:
              $ref: "#/components/schemas/Collection"
    CollectionWrite:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          example: Wellness Essentials
        description:
          type: [string, "null"]
        image_url:
          type: [string, "null"]
        image_path:
          type: [string, "null"]
        slug:
          type: string
          description: |
            Send `slug` + `custom_slug: true` together to pin a
            permanent merchant-set slug. Without `custom_slug: true`,
            the slug auto-regenerates from `title` on every title
            change.
        custom_slug:
          type: boolean
          description: |
            Send together with `slug` and set `true` to pin a permanent merchant-set
            slug. Without it, the slug is auto-generated from `title` and regenerates
            whenever the title changes.
        active:
          type: boolean
          description: |
            Merchant on/off toggle. Set `false` to hide the collection from every
            public surface regardless of `status`.
        status:
          type: string
          enum: [draft, scheduled, published, archived]
          description: |
            Lifecycle state to set. `published` with `active: true` makes the
            collection live; `scheduled` with a future `publish_at` goes live
            automatically when that time passes. There is no separate publish endpoint
            — visibility is changed through `active` and `status`.
        publish_at:
          type: [string, "null"]
          format: date-time
          description: |
            Target go-live timestamp used with `status: scheduled`. Once it passes,
            the row resolves to `published` at read time. Models go-live only — there
            is no unpublish-at field.
        application_theme_template_id:
          type: [integer, "null"]
        country_isos:
          type: array
          items:
            type: string
          description: |
            ISO country codes restricting availability; maps to the read-side
            `countries` field. An empty array (`[]`) clears all restrictions
            (unrestricted — available everywhere the company sells); omitting the key
            leaves the existing countries unchanged (PATCH semantics).
        product_ids:
          type: array
          items:
            type: integer
          description: |
            Full replacement set of product ids in this collection. `[]`
            empties it; key omitted leaves membership unchanged. Ids must
            belong to the authenticated store — a product from another
            store returns 422.
        metafields_attributes:
          type: array
          description: |
            Metafields to write on the collection using Rails nested-attributes
            semantics: each entry sets `namespace`, `key`, `value`, and `value_type`,
            with an optional `description`; send `_destroy: true` to remove an entry.
            Include the entry's `id` to update or destroy an existing metafield.
            (Category write bodies do not model this `id`.)
          items:
            type: object
            required: [namespace, key, value, value_type]
            properties:
              id:
                type: integer
                description: Present = update / destroy an existing entry.
              namespace:
                type: string
              key:
                type: string
              value: {}
              value_type:
                type: string
              description:
                type: string
              _destroy:
                type: boolean
        search_engine_optimizer_attributes:
          type: [object, "null"]
          description: |
            SEO record nested attributes. The response key is renamed to
            `seo` for v202604, but the request key stays at the AR
            `accepts_nested_attributes_for` name during the migration.
          properties:
            id:
              type: integer
            title:
              type: string
            description:
              type: string
            image_url:
              type: string
            block_crawler:
              type: boolean
    CollectionCreateRequest:
      type: object
      required: [collection]
      additionalProperties: false
      properties:
        collection:
          allOf:
            - $ref: "#/components/schemas/CollectionWrite"
            - required: [title]
    CollectionUpdateRequest:
      type: object
      required: [collection]
      additionalProperties: false
      properties:
        collection:
          $ref: "#/components/schemas/CollectionWrite"
    ScanStatus:
      type: object
      description: |
        Progress of an async lighthouse / compliance scan. Only `status`
        is guaranteed (`requested_at` is present in practice once a scan
        is requested); nil timestamps are omitted, so the present keys
        vary by phase — a failed scan carries `failed_at` + `error`, a
        completed one carries `started_at` + `completed_at`.
      required: [status]
      properties:
        status:
          type: string
          enum: [pending, in_progress, completed, failed]
          example: pending
        requested_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        failed_at:
          type: string
          format: date-time
        error:
          type: string
      example:
        status: pending
        requested_at: "2026-06-23T13:42:00Z"
    SharesResponse:
      type: object
      description: |
        Share statistics for a storefront resource — the same shape every
        storefront resource returns from `GET :id/shares`: a top-level
        `share_stats` object plus the `meta` envelope. There is no
        `resource` wrapper.
      required: [share_stats, meta]
      properties:
        share_stats:
          type: object
          required: [total_shares, shares_last_30_days, percent_change, unique_sharers, total_visits]
          properties:
            total_shares:
              type: integer
              example: 1284
            shares_last_30_days:
              type: integer
              example: 96
            percent_change:
              type: [number, "null"]
              description: |
                Percent change in shares vs. the previous 30-day window
                (rounded to 2 dp). `null` when the previous window had no
                shares — there is no baseline to compare against.
              example: 12.5
            unique_sharers:
              type: integer
              example: 311
            total_visits:
              type: integer
              description: Visits to the resource's storefront URL via tracked share links.
              example: 5230
        meta:
          $ref: "#/components/schemas/Meta"
      example:
        share_stats:
          total_shares: 1284
          shares_last_30_days: 96
          percent_change: 12.5
          unique_sharers: 311
          total_visits: 5230
        meta:
          request_id: 7f3c2a90-1c2b-4d5e-9aaa-112233445566
          timestamp: "2026-07-15T12:34:56Z"
    LighthouseResult:
      type: object
      description: |
        Latest Lighthouse result for the resource, returned raw — no
        `meta`, no top-level `status`. `core_metrics`, `category_scores`,
        and
        `optimization_opportunities` are derived from the raw `result`
        blob; any derived value can be `null` when the run did not
        produce it.
      required:
        - id
        - scanned_at
        - created_at
        - updated_at
        - device_type
        - final_url
        - fetch_time
        - core_metrics
        - category_scores
        - optimization_opportunities
        - result
      properties:
        id:
          type: integer
          example: 55
        scanned_at:
          type: [string, "null"]
          format: date-time
          example: "2026-06-23T13:42:17Z"
        created_at:
          type: string
          format: date-time
          example: "2026-06-23T13:42:17Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-06-23T13:42:20Z"
        device_type:
          type: [string, "null"]
          enum: [mobile, desktop, null]
          description: Lighthouse form factor (`formFactor` / `emulatedFormFactor`).
          example: mobile
        final_url:
          type: [string, "null"]
          example: https://acme.fluid.app/home/categories/summer-sale
        fetch_time:
          type: [string, "null"]
          format: date-time
          example: "2026-06-23T13:42:17Z"
        core_metrics:
          type: object
          description: |
            Summarized metrics derived from the raw result. Every key is
            always present; every value is nullable. Rating fields are
            `good` / `needs-improvement` / `poor` (or `null`).
          required:
            - performance_score
            - largest_contentful_paint
            - largest_contentful_paint_rating
            - first_input_delay
            - first_input_delay_rating
            - cumulative_layout_shift
            - cumulative_layout_shift_rating
            - time_to_interactive
            - total_blocking_time
            - first_contentful_paint
            - speed_index
            - device_type
          properties:
            performance_score:
              type: [number, "null"]
            largest_contentful_paint:
              type: [number, "null"]
            largest_contentful_paint_rating:
              type: [string, "null"]
            first_input_delay:
              type: [number, "null"]
            first_input_delay_rating:
              type: [string, "null"]
            cumulative_layout_shift:
              type: [number, "null"]
            cumulative_layout_shift_rating:
              type: [string, "null"]
            time_to_interactive:
              type: [number, "null"]
            total_blocking_time:
              type: [number, "null"]
            first_contentful_paint:
              type: [number, "null"]
            speed_index:
              type: [number, "null"]
            device_type:
              type: [string, "null"]
        category_scores:
          type: object
          description: |
            Per-Lighthouse-category score, 0–100 (`(score * 100).round`)
            or `null`. Keys are whatever categories the run produced
            (e.g. performance, accessibility, best-practices, seo, pwa).
          additionalProperties:
            type: [integer, "null"]
          example:
            performance: 91
            accessibility: 96
            best-practices: 92
            seo: 100
            pwa: 70
        optimization_opportunities:
          type: array
          description: |
            Audits with a savings opportunity (score < 1), sorted by
            estimated savings descending.
          items:
            type: object
            required: [id, title]
            properties:
              id:
                type: string
                example: uses-optimized-images
              title:
                type: [string, "null"]
                example: Efficiently encode images
              description:
                type: [string, "null"]
              score:
                type: [number, "null"]
                example: 0.72
              display_value:
                type: [string, "null"]
                example: Potential savings of 120 KiB
              savings_ms:
                type: [number, "null"]
                example: 340
              savings_bytes:
                type: [number, "null"]
                example: 122880
        result:
          type: object
          additionalProperties: true
          description: |
            Raw Lighthouse JSON blob (the upstream Google Lighthouse
            schema). Large (~100 KB typical); the summarized `core_metrics`,
            `category_scores`, and `optimization_opportunities` above are
            derived from it.
      example:
        id: 55
        scanned_at: "2026-06-23T13:42:17Z"
        created_at: "2026-06-23T13:42:17Z"
        updated_at: "2026-06-23T13:42:20Z"
        device_type: mobile
        final_url: https://acme.fluid.app/home/categories/summer-sale
        fetch_time: "2026-06-23T13:42:17Z"
        core_metrics:
          performance_score: 0.91
          largest_contentful_paint: 1850
          largest_contentful_paint_rating: good
          first_input_delay: null
          first_input_delay_rating: null
          cumulative_layout_shift: 0.03
          cumulative_layout_shift_rating: good
          time_to_interactive: 2400
          total_blocking_time: 120
          first_contentful_paint: 1200
          speed_index: 2100
          device_type: mobile
        category_scores:
          performance: 91
          accessibility: 96
          best-practices: 92
          seo: 100
          pwa: 70
        optimization_opportunities:
          - id: uses-optimized-images
            title: Efficiently encode images
            description: Optimized images load faster and consume less cellular data.
            score: 0.72
            display_value: Potential savings of 120 KiB
            savings_ms: 340
            savings_bytes: 122880
        result:
          lighthouseVersion: "11.4.0"
          finalDisplayedUrl: https://acme.fluid.app/home/categories/summer-sale
    ComplianceResult:
      type: object
      description: |
        Latest compliance scan result for the resource: the record nested
        under `item` plus the `meta` envelope. Nullable fields are
        unpopulated until the first successful scan.
      required: [item, meta]
      properties:
        item:
          type: object
          required: [id, status, service, compliance_issues, created_at, updated_at]
          properties:
            id:
              type: integer
              example: 77
            score:
              type: [string, "null"]
              description: |
                0.0–10.0; higher is better. Serialized as a decimal string —
                the backing column is `decimal(4,2)`, which Rails renders as a
                JSON string, not a number. `null` before the first successful
                scan.
              example: "8.4"
            status:
              type: string
              description: |
                Derived from `score` — `null` → `unknown`, `<4` → `poor`,
                `<6` → `fair`, `<8` → `good`, `>=8` → `excellent`.
              enum: [unknown, poor, fair, good, excellent]
              example: excellent
            summary:
              type: [string, "null"]
              example: All required disclosures present; no banned phrases detected.
            scanned_at:
              type: [string, "null"]
              format: date-time
              example: "2026-06-23T13:42:33Z"
            service:
              type: string
              description: Name of the scanning service that produced the result.
              example: openai
            created_at:
              type: string
              format: date-time
              example: "2026-06-23T13:42:33Z"
            updated_at:
              type: string
              format: date-time
              example: "2026-06-23T13:42:33Z"
            compliance_issues:
              type: array
              description: Per-issue findings; empty when the resource is compliant.
              items:
                type: object
                required: [id, issue_text, issue_type, created_at, updated_at]
                properties:
                  id:
                    type: integer
                    example: 401
                  issue_text:
                    type: string
                    example: Missing income disclosure on the earnings claim.
                  issue_reference:
                    type: [string, "null"]
                    example: FTC 16 CFR Part 255
                  issue_type:
                    type: string
                    example: disclosure
                  severity:
                    type: [string, "null"]
                    description: One of `low` / `medium` / `high` / `critical`, or `null`.
                    example: high
                  recommendation:
                    type: [string, "null"]
                    example: Add an FTC-compliant income disclosure adjacent to the claim.
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
        meta:
          $ref: "#/components/schemas/Meta"
      example:
        item:
          id: 77
          score: "8.4"
          status: excellent
          summary: All required disclosures present; no banned phrases detected.
          scanned_at: "2026-06-23T13:42:33Z"
          service: openai
          created_at: "2026-06-23T13:42:33Z"
          updated_at: "2026-06-23T13:42:33Z"
          compliance_issues: []
        meta:
          request_id: 7f3c2a90-1c2b-4d5e-9aaa-112233445566
          timestamp: "2026-07-15T12:34:56Z"
    ScanQueued:
      type: object
      description: |
        Response from `POST :id/lighthouse` and `POST :id/compliance` — the
        scan was accepted and queued, and the body carries the `meta`
        envelope. The new result lands at the corresponding GET endpoint
        when the job completes.
      required: [message, scan_status, resource_type, resource_id, meta]
      properties:
        message:
          type: string
          example: Lighthouse scan queued
        scan_status:
          $ref: "#/components/schemas/ScanStatus"
        resource_type:
          type: string
          description: PascalCase type name of the scanned resource.
          enum: [Category, Collection, Product, Library, Medium, Post, EnrollmentPack, Page]
          example: Category
        resource_id:
          type: integer
          example: 4821
        meta:
          $ref: "#/components/schemas/Meta"
      example:
        message: Lighthouse scan queued
        scan_status:
          status: pending
          requested_at: "2026-06-23T13:42:00Z"
        resource_type: Category
        resource_id: 4821
        meta:
          request_id: 7f3c2a90-1c2b-4d5e-9aaa-112233445566
          timestamp: "2026-07-15T12:34:56Z"
    LighthouseScanTriggered:
      type: object
      description: |
        `GET :id/lighthouse` 202 — returned when no Lighthouse scan exists
        yet, so one is auto-triggered. The body is raw — there is NO `meta`
        envelope.
      required: [message, scan_status]
      properties:
        message:
          type: string
          example: No Lighthouse scan exists. Scan has been triggered automatically.
        scan_status:
          $ref: "#/components/schemas/ScanStatus"
      example:
        message: No Lighthouse scan exists. Scan has been triggered automatically.
        scan_status:
          status: pending
          requested_at: "2026-06-23T13:42:00Z"
    ComplianceScanTriggered:
      type: object
      description: |
        `GET :id/compliance` 202 — returned when no compliance scan exists
        yet, so one is auto-triggered. The body carries the `meta`
        envelope.
      required: [message, scan_status, meta]
      properties:
        message:
          type: string
          example: No Compliance scan exists. Scan has been triggered automatically.
        scan_status:
          $ref: "#/components/schemas/ScanStatus"
        meta:
          $ref: "#/components/schemas/Meta"
      example:
        message: No Compliance scan exists. Scan has been triggered automatically.
        scan_status:
          status: pending
          requested_at: "2026-06-23T13:42:00Z"
        meta:
          request_id: 7f3c2a90-1c2b-4d5e-9aaa-112233445566
          timestamp: "2026-07-15T12:34:56Z"
paths:
  /api/v202604/categories:
    get:
      tags: [storefront]
      summary: Public Categories catalog
      operationId: storefrontCategoriesIndex
      description: |
        Unauthenticated. Company is resolved from the request subdomain.
        Returns ONLY live categories (active + resolved-published,
        country-eligible, language-eligible) — non-public rows never
        leak.

        Filters, search, and pagination are documented on each parameter.
      security: []
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/FilterCountry"
        - $ref: "#/components/parameters/FilterLanguage"
        - name: filter[source_type]
          in: query
          required: false
          description: |
            One source type: `product`, `medium`, `page`, `library`, or `promotion`.
            Categories only — the collection catalog does not accept this filter.
          schema:
            type: string
            enum: [product, medium, page, library, promotion]
        - name: filter[parent_id]
          in: query
          required: false
          description: |
            A category id as a string, or the literal `"root"` for top-level
            categories only. Selects a single level of the tree. Categories
            only — collections have no hierarchy. Honored on both the public
            catalog and the company index, which share one query contract.
          schema:
            type: string
            example: "root"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: A page of live categories.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"
              example:
                status: 200
                categories:
                  - id: 4821
                    slug: summer-sale
                    title: Summer Sale
                    description: Hand-picked categories for the July clearance.
                    image_url: https://cdn.fluid.app/categories/4821.png
                    canonical_url: https://acme.fluid.app/home/categories/summer-sale
                    images:
                      thumb:  { url: "https://ik.imagekit.io/fluidapp/tr:w-200,c-at_max,f-auto,q-70/categories/4821.png",  width: 200 }
                      medium: { url: "https://ik.imagekit.io/fluidapp/tr:w-600,c-at_max,f-auto,q-75/categories/4821.png",  width: 600 }
                      large:  { url: "https://ik.imagekit.io/fluidapp/tr:w-1200,c-at_max,f-auto,q-80/categories/4821.png", width: 1200 }
                    active: true
                    status: published
                    publish_at: null
                    seo:
                      id: 9215
                      title: Summer Sale — Up to 40% Off
                      description: Shop the July clearance event before it ends.
                      image_url: https://ik.imagekit.io/fluidapp/tr:w-1200,h-630,c-maintain_ratio,fo-auto,f-auto,q-80/seo/9215.png
                      block_crawler: false
                    metafields: []
                    countries: [GB, US]
                    languages: [en, fr]
                    parent_id: null
                    position: 1
                    source_type: product
                    has_children: false
                  - id: 4822
                    slug: clearance
                    title: Clearance
                    description: Last-chance prices on overstock items.
                    image_url: null
                    canonical_url: https://acme.fluid.app/home/categories/clearance
                    images: null
                    active: true
                    status: published
                    publish_at: null
                    seo:
                      title: Clearance
                      description: Last-chance prices on overstock items.
                      image_url: https://ik.imagekit.io/fluid/980191006/images/VJBWJ3/VJBWJ3_QDwktuK8Ji.webp
                      block_crawler: false
                    metafields: []
                    countries: []
                    languages: [en]
                    parent_id: null
                    position: 2
                    source_type: product
                    has_children: false
                meta:
                  request_id: 7f3c2a90-1c2b-4d5e-9aaa-112233445566
                  timestamp: "2026-07-15T12:34:56Z"
                  pagination:
                    cursor: null
                    next_cursor: eyJpZCI6NDgyMn0
                    prev_cursor: null
                    limit: 25
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v202604/categories/{slug}:
    get:
      tags: [storefront]
      summary: Public Category by slug
      operationId: storefrontCategoryShow
      description: |
        Unauthenticated. Resolves by slug (the canonical public
        identifier; matches `canonical_url`). Returns 404 for any
        non-live row so unlisted categories never leak their existence.
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          description: |
            Canonical public slug of the category; matches the row's `canonical_url`.
          schema:
            type: string
        - $ref: "#/components/parameters/Lang"
      responses:
        "200":
          description: The Category.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryShowResponse"
              example:
                status: 200
                meta:
                  request_id: 7f3c2a90-1c2b-4d5e-9aaa-112233445566
                  timestamp: "2026-07-15T12:34:56Z"
                category:
                  id: 4821
                  slug: summer-sale
                  title: Summer Sale
                  description: Hand-picked categories for the July clearance.
                  image_url: https://cdn.fluid.app/categories/4821.png
                  canonical_url: https://acme.fluid.app/home/categories/summer-sale
                  images:
                    thumb:  { url: "https://ik.imagekit.io/fluidapp/tr:w-200,c-at_max,f-auto,q-70/categories/4821.png",  width: 200 }
