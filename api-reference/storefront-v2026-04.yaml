            index to a single lifecycle state. Company-surface only.
          schema:
            type: string
            enum: [draft, scheduled, published, archived]
        - $ref: "#/components/parameters/FilterActive"
        - $ref: "#/components/parameters/Sort"
      responses:
        "200":
          description: A page of collections (every lifecycle state).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    post:
      tags: [company]
      summary: Create a Collection
      operationId: companyCollectionsCreate
      description: |
        Token-authenticated; requires `storefront.update` (or legacy
        `collections.update` during the migration).

        Triggers fresh Lighthouse + compliance scans automatically
        — a subsequent `GET :id/lighthouse` / `:id/compliance`
        returns `scan_status: pending` while the queued scans run.
      security:
        - bearer_auth: []
      parameters:
        - $ref: "#/components/parameters/LangWrite"
        - $ref: "#/components/parameters/Lang"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionCreateRequest"
            examples:
              minimal:
                summary: Minimal create
                value:
                  collection:
                    title: Wellness Essentials
              full:
                summary: Full create
                value:
                  collection:
                    title: Wellness Essentials
                    description: Hand-picked supplements and recovery gear.
                    slug: wellness-essentials
                    custom_slug: true
                    active: true
                    status: scheduled
                    publish_at: "2026-07-01T08:00:00Z"
                    country_isos: [GB, US]
                    metafields_attributes:
                      - namespace: custom
                        key: theme_accent
                        value: "#1ABC9C"
                        value_type: single_line_text_field
                    search_engine_optimizer_attributes:
                      title: Wellness Essentials — Curated Picks
                      description: Hand-picked supplements and recovery gear.
                      image_url: https://ik.imagekit.io/fluid/seo/9302.png
                      block_crawler: false
      responses:
        "201":
          description: The created Collection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v202604/company/collections/{id}:
    get:
      tags: [company]
      summary: Company Collection show
      operationId: companyCollectionsShow
      description: |
        Token-authenticated; resolves by id. Returns any Collection
        regardless of lifecycle.
      security:
        - bearer_auth: []
      parameters:
        - name: id
          in: path
          required: true
          description: |
            Numeric id of the collection — the canonical company identifier.
          schema:
            type: integer
        - $ref: "#/components/parameters/Lang"
      responses:
        "200":
          description: The Collection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [company]
      summary: Update a Collection
      operationId: companyCollectionsUpdate
      description: |
        Token-authenticated. PATCH semantics — only keys present in
        the payload are updated. Triggers fresh Lighthouse + compliance
        scans automatically.
      security:
        - bearer_auth: []
      parameters:
        - $ref: "#/components/parameters/LangWrite"
        - name: id
          description: The unique identifier of the collection.
          in: path
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/Lang"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionUpdateRequest"
            examples:
              publish:
                summary: Publish (make live)
                value:
                  collection:
                    status: published
                    active: true
              setCountries:
                summary: Restrict country availability
                value:
                  collection:
                    country_isos: [GB, US]
              clearCountries:
                summary: Clear restrictions (available everywhere the company sells)
                value:
                  collection:
                    country_isos: []
      responses:
        "200":
          description: The updated Collection.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CollectionShowResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
    delete:
      tags: [company]
      summary: Destroy a Collection
      operationId: companyCollectionsDestroy
      description: |
        Token-authenticated. HARD-delete — Collection does not yet use
        the Discard concern. Fires a `collections.deleted` webhook
        post-commit.
      security:
        - bearer_auth: []
      parameters:
        - name: id
          description: The unique identifier of the collection.
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

