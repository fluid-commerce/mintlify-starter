  /api/v202604/company/collections/{id}/products:
    get:
      tags: [company]
      summary: Products in a Collection
      operationId: companyCollectionProducts
      description: |
        Every product filed under this collection, including the draft and
        archived rows the public listing hides.

        Same response body, filters, sorting, search, country-relative
        pricing, and cursor pagination as
        `GET /api/v202604/company/products`. The collection in the path always
        wins — a `filter[collection_ids]` in the query string cannot widen the
        listing beyond it.

        Requires `storefront.view` (legacy `collections.view` still accepted).
      parameters:
        - name: id
          description: The unique identifier of the collection whose products to list.
          in: path
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
        - name: filter[status]
          in: query
          required: false
          description: Restrict to a single stored lifecycle state.
          schema:
            type: string
            enum: [active, draft, archived]
        - name: filter[availability]
          in: query
          required: false
          description: |
            Stock filter. `in_stock` restricts to purchasable products;
            `all` (default) imposes no stock constraint.
          schema:
            type: string
            enum: [all, in_stock]
            default: all
        - name: filter[bundle]
          in: query
          required: false
          description: |
            `true` returns only bundle products; `false` returns only
            non-bundle products.
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          description: |
            Single sort key. Prefix with `-` for descending. Default
            `priority` then `id`.
          schema:
            type: string
            enum: [priority, -priority, title, -title, created_at, -created_at]
      responses:
        "200":
          description: A page of products in this collection, every lifecycle state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v202604/company/collections/{id}/lighthouse:
    get:
      tags: [company]
      summary: Latest Lighthouse result
      operationId: companyCollectionsLighthouseShow
      description: |
        Returns the most recent Lighthouse scan for the Collection,
        including the full Lighthouse JSON `result` blob. When no scan
        exists, queues one and returns 202 with `scan_status`.
      security:
        - bearer_auth: []
      parameters:
        - name: id
          description: The unique identifier of the collection.
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Latest Lighthouse result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LighthouseResult"
        "202":
          description: |
            No Lighthouse scan existed yet; one was triggered
            automatically. Poll `GET :id/lighthouse` for the result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LighthouseScanTriggered"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [company]
      summary: Trigger a Lighthouse scan
      operationId: companyCollectionsLighthouseScan
      description: |
        Queues a fresh Lighthouse scan. Returns immediately with `202
        Accepted`; the new result lands at `GET :id/lighthouse` when
        the job completes.
      security:
        - bearer_auth: []
      parameters:
        - name: id
          description: The unique identifier of the collection.
          in: path
          required: true
          schema:
            type: integer
      responses:
        "202":
          description: Scan accepted and queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanQueued"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

