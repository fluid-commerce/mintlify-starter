        - $ref: "#/components/parameters/PageLimit"
        - name: filter[status]
          in: query
          required: false
          description: Raw Product enum key.
          schema:
            type: string
            enum: [active, draft, archived]
        - name: filter[availability]
          in: query
          required: false
          description: |
            Stock filter. `in_stock` restricts to purchasable products; `all`
