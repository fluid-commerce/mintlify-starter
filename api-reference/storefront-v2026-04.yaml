  /api/v202604/collections/{slug}/products:
    get:
      tags: [storefront]
      summary: Products in a Collection (public)
      operationId: storefrontCollectionProducts
      description: |
        PUBLIC endpoint — NO authentication required. Company is resolved
        from the request subdomain.

        The products catalog scoped to one collection, not a second catalog:
        the response body, filters, sorting, search, country-relative
        pricing, and cursor pagination are identical to
        `GET /api/v202604/products`. Returns ONLY live products (active +
        resolved-published) with an active variant in the requested
        `country`.

        The collection in the path always wins — a `filter[collection_ids]` in the
        query string cannot widen the listing beyond it. Returns 404 when
        no live collection matches the slug.
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          description: The collection's slug, as returned in its `slug` field.
          schema:
            type: string
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Country"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
        - name: filter[availability]
          in: query
          required: false
          description: |
            Stock filter. `in_stock` restricts to purchasable products;
            `all` (default) imposes no stock constraint.
          schema:
            type: string
            enum: [all, in_stock]
            default: all
        - name: filter[bundle]
          in: query
          required: false
          description: |
            `true` returns only bundle products; `false` returns only
            non-bundle products.
          schema:
            type: boolean
        - name: sort
          in: query
          required: false
          description: |
            Single sort key. Prefix with `-` for descending. Default
            `priority` then `id`.
          schema:
            type: string
            enum: [priority, -priority, title, -title, created_at, -created_at]
      responses:
        "200":
          description: A page of live products in this collection, with country-relative pricing.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
  /api/v202604/company/collections:
