          schema:
            type: boolean
        - name: filter[category_ids]
          in: query
          required: false
          description: |
            Restrict to products in any of these category ids.
          schema:
            type: array
            items:
              type: integer
        - name: filter[collection_ids]
          in: query
          required: false
          description: |
            Restrict to products in any of these collection ids.
          schema:
            type: array
            items:
