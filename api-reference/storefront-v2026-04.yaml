  /api/v202604/company/categories:
    get:
      tags: [company]
      summary: Company Categories index
      operationId: companyCategoriesIndex
      description: |
        Token-authenticated. Returns EVERY Category for the calling
        company regardless of lifecycle (draft / scheduled / archived
        rows included), so admins can manage non-public rows.

        Supports the same cursor pagination / filter / sort / `q`
        contract as the public catalog — `filter[source_type]` and
        `filter[parent_id]` behave identically here (one shared
        `ListParams`). Adds `filter[status]` and `filter[active]`,
        which are accepted on both surfaces but only take effect here.
      security:
        - bearer_auth: []
      parameters:
        - $ref: "#/components/parameters/Lang"
        - $ref: "#/components/parameters/Q"
        - $ref: "#/components/parameters/PageCursor"
        - $ref: "#/components/parameters/PageLimit"
        - $ref: "#/components/parameters/FilterCountry"
        - $ref: "#/components/parameters/FilterLanguage"
        - name: filter[source_type]
          in: query
          required: false
          description: |
            One source type: `product`, `medium`, `page`, `library`, or `promotion`.
            Categories only — the collection catalog does not accept this filter.
          schema:
            type: string
            enum: [product, medium, page, library, promotion]
        - name: filter[parent_id]
          in: query
          required: false
          description: |
            A category id as a string, or the literal `"root"` for top-level
            categories only. Selects a single level of the tree. Categories
            only — collections have no hierarchy. Honored on both the public
            catalog and the company index, which share one query contract.
          schema:
            type: string
            example: "root"
        - name: filter[status]
          in: query
          required: false
          description: |
            One of `draft`, `scheduled`, `published`, or `archived`. Restricts the
            index to a single lifecycle state. Company-surface only.
          schema:
            type: string
            enum: [draft, scheduled, published, archived]
