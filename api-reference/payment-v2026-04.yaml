---
openapi: 3.1.0
info:
  title: Fluid Payment API
  version: v2026-04
  description: Payment gateway and transaction management API. Supports API key authentication
    (fp_live_*/fp_test_*) and JWT bearer tokens.
  contact:
    email: support@fluid.app
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
- url: https://api.fluid.app
tags:
- name: Gateways
  description: Manage payment gateways and run gateway-level transactions —
    purchase, authorize, and $0 verification.
- name: Transactions
  description: Read transactions and run transaction lifecycle operations —
    capture, void, and credit/refund.
- name: Merchant Configuration
  description: Read and update a merchant's payment configuration — VGS, Kount,
    3DS acquirer, and payout settings.
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      description: API key (fp_live_*/fp_test_*) or JWT bearer token
  schemas:
    Meta:
      type: object
      required:
      - request_id
      - timestamp
      properties:
        request_id:
          type:
          - string
          - 'null'
          description: |
            Unique identifier for this request, echoed on every response for log
            correlation and support; `null` when none was assigned.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp (UTC) of when the response was generated.
    ErrorResponse:
      oneOf:
      - type: object
        required:
        - status
        - message
        - meta
        properties:
          status:
            type: string
            enum:
            - error
            description: Always `error` for this envelope.
          message:
            type: string
            description: Human-readable description of what went wrong.
          meta:
            "$ref": "#/components/schemas/Meta"
      - type: object
        required:
        - error_message
        - errors
        - meta
        properties:
          error_message:
            type: string
            description: Human-readable summary of the failure.
          errors:
            "$ref": "#/components/schemas/ErrorBag"
          meta:
            "$ref": "#/components/schemas/Meta"
    UnauthorizedResponse:
      type: object
      required:
      - message
      - meta
      properties:
        message:
          type: string
          description: Human-readable reason the credentials were rejected.
        status:
          type: string
          description: Error status string, when present.
        meta:
          "$ref": "#/components/schemas/Meta"
    ForbiddenResponse:
      description: |
        Authenticated but not authorized. Two body shapes occur:
        - a bare `message` when the credential lacks the required role/tier
          (e.g. a non-admin JWT calling an admin endpoint)
        - a `status` + field `errors` object when an admin-tier caller writes
          a root-admin-only configuration field
      oneOf:
      - type: object
        required:
        - message
        - meta
        properties:
          message:
            type: string
          meta:
            "$ref": "#/components/schemas/Meta"
      - type: object
        required:
        - status
        - errors
        - meta
        properties:
          status:
            type: string
            enum:
            - error
          errors:
            "$ref": "#/components/schemas/ErrorBag"
          meta:
            "$ref": "#/components/schemas/Meta"
    Gateway:
      type: object
      required:
      - id
      - name
      - integration_type
      - mode
      - supported_sources
      - country_codes
      - settings
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: |
            Gateway slug identifier — the stable string used to address this gateway
            on `/gateways/{id}` and its transaction sub-routes.
        name:
          type: string
          description: Human-readable display name for the gateway.
        integration_type:
          type: string
          description: |
            Integration class backing the gateway (e.g. `CreditCard`, `PayPal`). Selects
            the provider adapter and the credential set used to process transactions.
        mode:
          type: string
          enum:
          - live
          - test
          - sandbox
          description: |
            Environment the gateway operates in. `live` moves real funds; `test` and
            `sandbox` route to the provider's non-production environment.
        supported_sources:
          type: array
          items:
            type: string
          description: Card brands / payment sources the gateway accepts (e.g. `visa`, `mastercard`).
        country_codes:
          type: array
          items:
            type: string
          description: ISO 3166-1 alpha-2 country codes the gateway is enabled for.
        settings:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: |
            Provider-specific configuration key/values for the gateway. The shape varies
            by `integration_type`; secret values are obfuscated on read.
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601).
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the last update to the gateway (ISO 8601).
    Transaction:
      type: object
      required:
      - id
      - action
      - status
      - amount_cents
      - currency_code
      - processing_fee_cents
      - credited_amount_cents
      - retain_on_success
      - metadata
      - created_at
      - updated_at
      properties:
        id:
          type: string
          description: |
            Transaction slug identifier — the stable string used to address this
            transaction on `/transactions/{id}` and its lifecycle sub-routes (capture,
            void, credit).
        gateway_id:
          type:
          - string
          - 'null'
          description: Slug of the gateway that processed the transaction; `null` when not applicable.
        payment_method_id:
          type:
          - string
          - 'null'
          description: Slug of the payment method used; `null` when none is associated.
        parent_transaction_id:
          type:
          - string
          - 'null'
          description: |
            Slug of the originating transaction when this row is a capture, void, or
            credit/refund; `null` for the initial purchase or authorization.
        action:
          type: string
          enum:
          - purchase
          - authorize
          - capture
          - void
          - refund
          - verify
          - general_credit
          description: |
            Operation this transaction represents. `purchase` and `authorize` are
            initiated on a gateway; `capture`, `void`, `refund`, and `general_credit`
            act against a prior transaction; `verify` is a $0 payment-method check.
        status:
          type: string
          enum:
          - success
          - declined
          - error
          - pending
          description: |
            Outcome of the transaction: `success`, `declined` (rejected by the
            provider), `error` (processing failure), or `pending` (awaiting a final
            result from the provider).
        amount_cents:
          type:
          - integer
          - 'null'
          description: |
            Transaction amount in the smallest currency unit (cents); `null` when not
            applicable, such as a $0 verification.
        currency_code:
          type: string
          description: ISO 4217 currency code
        payment_source:
          type:
          - string
          - 'null'
          description: Integration class (e.g. CreditCard, PayPal)
        gateway_transaction_id:
          type:
          - string
          - 'null'
          description: |
            Identifier assigned by the payment provider for this transaction; `null`
            until the provider responds.
        reference_token:
          type:
          - string
          - 'null'
          description: Merchant reference token
        description:
          type:
          - string
          - 'null'
          description: Optional free-text description carried on the transaction.
        processing_fee_cents:
          type: integer
          description: Processing fee in cents
        platform_fee_cents:
          type: integer
          description: Fluid platform fee in cents
        credited_amount_cents:
          type: integer
          description: |
            Cumulative amount (in cents) refunded or credited against this transaction;
            partial refunds accumulate here.
        retain_on_success:
          type: boolean
          description: |
            Whether the payment method used was retained for future reuse when the
            transaction succeeded.
        metadata:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: Arbitrary merchant key/value pairs stored on and echoed back with the transaction.
        created_at:
          type: string
          format: date-time
          description: Creation timestamp (ISO 8601).
        updated_at:
          type: string
          format: date-time
          description: Timestamp of the last update to the transaction (ISO 8601).
    GatewayDataResponse:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          "$ref": "#/components/schemas/Gateway"
        meta:
          "$ref": "#/components/schemas/Meta"
    GatewayListResponse:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/Gateway"
        meta:
          "$ref": "#/components/schemas/Meta"
    TransactionDataResponse:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          "$ref": "#/components/schemas/Transaction"
        meta:
          "$ref": "#/components/schemas/Meta"
    TransactionListResponse:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          type: array
          items:
            "$ref": "#/components/schemas/Transaction"
        meta:
          "$ref": "#/components/schemas/Meta"
    BillingAddress:
      type: object
      additionalProperties: false
      description: Postal address for the transaction; the same shape is used for billing and shipping.
      properties:
        first_name:
          type: string
          description: Contact first name.
        last_name:
          type: string
          description: Contact last name.
        address1:
          type: string
          description: Primary street address line.
        address2:
          type:
          - string
          - 'null'
          description: Secondary address line (unit, suite, etc.); `null` when not provided.
        city:
          type: string
          description: City.
        state:
          type: string
          description: State, province, or region.
        zip:
          type: string
          description: Postal or ZIP code.
        country:
          type: string
          description: Country of the address.
    TransactionRequest:
      type: object
      additionalProperties: false
      required:
      - amount_cents
      - currency_code
      properties:
        amount_cents:
          type: integer
          minimum: 1
          description: Amount to charge in the smallest currency unit (cents). Minimum `1`.
        currency_code:
          type: string
          description: ISO 4217 currency code
        payment_source:
          type: string
          description: |
            Overrides the integration class used for this transaction (e.g.
            `CreditCard`, `PayPal`); defaults to the gateway's configured type.
        payment_method_id:
          type: string
          description: Payment method slug
        reference_token:
          type: string
          description: Optional merchant-supplied reference stored on the transaction.
        description:
          type: string
          description: Optional free-text description stored on the transaction.
        retain_on_success:
          type: boolean
          description: When `true`, retain the payment method for future reuse if the transaction succeeds.
        transaction_type:
          type: string
          description: |
            Initiation category: `cit` (customer-initiated), `mit` (merchant-initiated),
            or `recurring`.
        email:
          type: string
          description: Customer email address associated with the transaction.
        billing_address:
          "$ref": "#/components/schemas/BillingAddress"
        shipping_address:
          "$ref": "#/components/schemas/BillingAddress"
        metadata:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: Arbitrary merchant key/value pairs to store with the transaction.
    KountAccount:
      type: object
      description: One Kount account configuration. Sandbox and production are persisted as separate accounts; the active environment is mirrored by MerchantConfiguration.kount_environment.
      required:
      - environment
      - enterprise
      properties:
        environment:
          type: string
          enum:
          - sandbox
          - production
          description: Kount account environment.
        enterprise:
          type: boolean
          description: When true, this account uses merchant-owned Kount 360 credentials. When false, it uses Fluid's portfolio credentials with a channel prefix.
        channel_prefix:
          type:
          - string
          - 'null'
          maxLength: 63
          description: Portfolio account channel prefix. Required when enterprise is false.
        api_key:
          type:
          - string
          - 'null'
          description: Enterprise Kount API key. Obfuscated on read; omit or send obfuscated value to preserve the stored secret.
        client_id:
          type:
          - string
          - 'null'
          example: "150953359757648"
          description: Enterprise Kount Client ID (MID). Plain text and public-by-design for the checkout DDC script.
        webhook_signing_key:
          type:
          - string
          - 'null'
          description: Enterprise webhook signing key. Obfuscated on read; omit or send obfuscated value to preserve the stored secret.
    MerchantConfiguration:
      type: object
      properties:
        vgs_client_id:
          type:
          - string
          - 'null'
          description: VGS client ID
        vgs_client_secret:
          type:
          - string
          - 'null'
          description: VGS client secret (obfuscated on read)
        vgs_environment:
          type:
          - string
          - 'null'
          enum:
          - live
          - sandbox
          -
          description: VGS environment
        kount_enterprise:
          type:
          - boolean
          - 'null'
          example: false
          description: When true, this merchant uses its own Kount 360 account; credentials
            come from kount_api_key + kount_webhook_signing_key. When false, Fluid's
            master Kount account is used (env-aware) and kount_channel_prefix segments
            traffic.
        kount_api_key:
          type:
          - string
          - 'null'
          description: Kount API key (obfuscated on read)
        kount_environment:
          type:
          - string
          - 'null'
          enum:
          - sandbox
          - production
          -
          description: Kount environment
        kount_client_id:
          type:
          - string
          - 'null'
          example: "150953359757648"
          description: Per-merchant Kount Client ID (MID). Required when kount_enterprise is true; used by the Kount Web SDK on the checkout page so DDC data lands in this merchant's Kount tenant. Plain text — public-by-design.
        kount_channel_prefix:
          type:
          - string
          - 'null'
          maxLength: 63
          description: Bare Kount channel prefix for the merchant (e.g. "yoli" or
            "rain-international"); appended to source tokens at runtime to form channel
            values like "yoli-WEB". Root-admin write only.
        kount_webhook_signing_key:
          type:
          - string
          - 'null'
          example: "MG9h********Tg=="
          description: Obfuscated RSA public key the merchant gets from their Kount
            360 portal. Used to verify decision webhooks for enterprise accounts.
            Returned masked.
        kount_accounts:
          type: array
          description: Complete persisted Kount account set. Contains up to one sandbox account and one production account; kount_environment selects which account routes checkout traffic.
          items:
            "$ref": "#/components/schemas/KountAccount"
        network_tokens_enabled:
          type:
          - boolean
          - 'null'
          description: Whether network tokens are enabled
        vgs_cmp_vault_id:
          type:
          - string
          - 'null'
          description: VGS CMP vault ID for cross-vault proxy
        vgs_proxy_username:
          type:
          - string
          - 'null'
          description: VGS proxy username
        vgs_proxy_password:
          type:
          - string
          - 'null'
          description: VGS proxy password (obfuscated on read)
        network_3ds_setting:
          type: object
          description: Per-network 3DS acquirer settings
          properties:
            visa_acquirer_bin:
              type: string
            visa_acquirer_merchant_id:
              type: string
            mastercard_acquirer_bin:
              type: string
            mastercard_acquirer_merchant_id:
              type: string
            amex_acquirer_bin:
              type: string
            amex_acquirer_merchant_id:
              type: string
            amex_acquirer_requestor_id:
              type: string
            amex_acquirer_requestor_name:
              type: string
            discover_acquirer_bin:
              type: string
            discover_acquirer_merchant_id:
              type: string
            discover_acquirer_requestor_id:
              type: string
            discover_acquirer_requestor_name:
              type: string
        payouts_settings:
          type: object
          description: Payout collection settings
          properties:
            payout_collection_enabled:
              type: boolean
              description: Whether automatic payout collection is enabled for the merchant.
            payout_collection_schedule:
              type: string
              enum:
              - hourly_4
              - daily
              - weekly
              description: |
                Cadence at which payouts are collected: `hourly_4` (every 4 hours),
                `daily`, or `weekly`.
            minimum_payout_amount:
              type: number
              description: Minimum balance required before a payout is collected.
            last_payout_collection_at:
              type: string
              format: date-time
              description: Timestamp of the most recent payout collection (ISO 8601).
        platform_fee_rate:
          type: number
          description: Fluid platform fee rate (percentage)
          example: 2.9
        platform_fee_fixed:
          type: number
          description: Fluid platform fee fixed amount (USD)
          example: 0.3
    MerchantConfigurationResponse:
      type: object
      required:
      - data
      - meta
      properties:
        data:
          "$ref": "#/components/schemas/MerchantConfiguration"
        meta:
          "$ref": "#/components/schemas/Meta"
    MerchantConfigurationUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        vgs_client_id:
          type: string
        vgs_client_secret:
          type: string
          description: Omit or send obfuscated value to preserve existing secret
        vgs_environment:
          type: string
          enum:
          - live
          - sandbox
        kount_enterprise:
          type: boolean
          example: false
          description: When true, this merchant uses its own Kount 360 account; kount_api_key
            and kount_webhook_signing_key are required. When false, Fluid's master
            Kount account is used.
        kount_api_key:
          type: string
          description: Omit or send obfuscated value to preserve existing secret
        kount_environment:
          type: string
          enum:
          - sandbox
          - production
        kount_client_id:
          type:
          - string
          - 'null'
          example: "150953359757648"
          description: Required when kount_enterprise is true.
        kount_channel_prefix:
          type:
          - string
          - 'null'
          maxLength: 63
          description: Bare Kount channel prefix for the merchant (e.g. "yoli" or
            "rain-international"); appended to source tokens at runtime to form channel
            values like "yoli-WEB". Root-admin write only.
        kount_webhook_signing_key:
          type:
          - string
          - 'null'
          example: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8A...\n-----END
            PUBLIC KEY-----"
          description: RSA public key in PEM or bare SPKI base64. Required when kount_enterprise
            is true.
        kount_accounts:
          type: array
          description: Complete Kount account set to persist. Send this with kount_environment to store inactive sandbox/production accounts and select the active one.
          items:
            "$ref": "#/components/schemas/KountAccount"
        network_tokens_enabled:
          type: boolean
        vgs_cmp_vault_id:
          type: string
        vgs_proxy_username:
          type: string
        vgs_proxy_password:
          type: string
          description: Omit or send obfuscated value to preserve existing secret
        visa_acquirer_bin:
          type: string
        visa_acquirer_merchant_id:
          type: string
        mastercard_acquirer_bin:
          type: string
        mastercard_acquirer_merchant_id:
          type: string
        amex_acquirer_bin:
          type: string
        amex_acquirer_merchant_id:
          type: string
        amex_acquirer_requestor_id:
          type: string
        amex_acquirer_requestor_name:
          type: string
        discover_acquirer_bin:
          type: string
        discover_acquirer_merchant_id:
          type: string
        discover_acquirer_requestor_id:
          type: string
        discover_acquirer_requestor_name:
          type: string
        payout_collection_enabled:
          type: boolean
        payout_collection_schedule:
          type: string
          enum:
          - hourly_4
          - daily
          - weekly
        minimum_payout_amount:
          type: number
          format: decimal
        platform_fee_rate:
          type: number
          format: decimal
          description: Fluid platform fee rate (percentage)
          example: 2.9
        platform_fee_fixed:
          type: number
          format: decimal
          description: Fluid platform fee fixed amount (USD)
          example: 0.3
    GatewayCreateRequest:
      type: object
      additionalProperties: false
      required:
      - name
      - integration_type
      properties:
        name:
          type: string
          description: Display name for the new gateway.
        integration_type:
          type: string
          description: |
            Integration class for the gateway (e.g. `CreditCard`, `PayPal`); selects the
            provider adapter.
        mode:
          type: string
          enum:
          - live
          - test
          - sandbox
          description: |
            Environment the gateway runs in: `live`, `test`, or `sandbox`.
        credentials:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: |
            Provider credentials (API keys, secrets) for the gateway. Write-only —
            obfuscated or omitted on read.
        country_codes:
          type: array
          items:
            type: string
          description: ISO 3166-1 alpha-2 country codes the gateway should be enabled for.
        settings:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: Provider-specific configuration key/values; shape varies by `integration_type`.
    GatewayUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
          description: New display name; omit to leave unchanged.
        credentials:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: Provider credentials to update; omit to preserve stored secrets.
        country_codes:
          type: array
          items:
            type: string
          description: ISO 3166-1 alpha-2 country codes the gateway is enabled for; omit to leave unchanged.
        settings:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: Provider-specific configuration key/values; omit to leave unchanged.
    JsonValue:
      description: Any valid JSON value for provider, integration, theme, metadata,
        or other dynamic payloads whose keys are not fixed by the API contract.
      anyOf:
      - type: string
      - type: number
      - type: boolean
      - type: 'null'
      - type: array
        items:
          "$ref": "#/components/schemas/JsonValue"
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/JsonValue"
    ErrorValue:
      description: A validation or API error value.
      anyOf:
      - type: string
      - type: array
        items:
          type: string
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/JsonValue"
    ErrorBag:
      description: Validation errors keyed by field, a list of errors, a single error
        message, or null when no structured error details are available.
      anyOf:
      - type: string
      - type: array
        items:
          "$ref": "#/components/schemas/ErrorValue"
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/ErrorValue"
      - type: 'null'
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Optional client-generated key (UUID recommended) used to deduplicate
        retries. The first request with a given key executes normally; a retry
        with the same key replays that first response with
        `X-Idempotent-Replayed: true` for up to 24 hours. A concurrent retry
        while the first request is still in flight returns 409.

        The response cache is keyed on the authenticated merchant and this key
        ONLY — not on the operation, path, or request body. Use a fresh, unique
        key per logical request: reusing one key across different operations
        (for example a purchase and then a capture) replays the first
        operation's cached status and body instead of performing the second.
      schema:
        type: string
        maxLength: 255
  responses:
    BadRequest:
      description: |
        Malformed request — a required top-level parameter (e.g. the
        `configuration` wrapper) is missing. Raised by `params.expect` and
        rendered as the standard `{ status, message, meta }` error body.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/UnauthorizedResponse"
    Forbidden:
      description: Authenticated but not authorized for this action.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ForbiddenResponse"
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    Conflict:
      description: |
        A request with the same Idempotency-Key is already being processed.
        Retry once the in-flight request completes; the cached response then
        replays with `X-Idempotent-Replayed: true`.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Validation or business error.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/ErrorResponse"
security:
- bearer_auth: []
paths:
  "/api/payment/v2026-04/gateways":
    get:
      operationId: listGateways
      summary: List gateways
      description: |
        Lists the payment gateways configured for the authenticated merchant.
