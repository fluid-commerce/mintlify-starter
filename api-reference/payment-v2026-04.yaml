        request body is optional. Returns `404` when the gateway is not found and `422`
        when the request fails validation.
      tags:
      - Gateways
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                transaction:
                  type: object
                  additionalProperties: false
                  properties:
                    payment_source:
                      type: string
                    payment_method_id:
                      type: string
                    currency_code:
                      type: string
            examples:
              verify:
                summary: Zero-dollar verification of a saved payment method
                value:
                  transaction:
                    payment_method_id: pm_9f8e7d6c
                    currency_code: USD
      responses:
        '201':
          description: Verification created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TransactionDataResponse"
