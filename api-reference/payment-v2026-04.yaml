  "/api/payment/v2026-04/transactions/{id}/capture":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: Transaction slug (authorization to capture)
    post:
      operationId: captureTransaction
      summary: Capture an authorization
      description: |
        Captures funds previously held by an authorization. Send `amount_cents` for a
        partial capture; omit it to capture the full authorized amount. Creates a
        `capture` transaction linked to the authorization via `parent_transaction_id`
        and returns it with `201`. Pass an `Idempotency-Key` header to make retries
        safe. Returns `404` when the authorization is not found, `409` on an in-flight
        duplicate key, and `422` when the authorization cannot be captured.
      tags:
      - Transactions
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                transaction:
                  type: object
                  additionalProperties: false
                  properties:
                    amount_cents:
                      type: integer
                      minimum: 1
                      description: Partial capture amount (defaults to full authorization
                        amount)
                    metadata:
                      type: object
                      additionalProperties:
                        "$ref": "#/components/schemas/JsonValue"
            examples:
              full_capture:
                summary: Capture the full authorized amount
                value: {}
              partial_capture:
                summary: Partial capture of $10.00
                value:
                  transaction:
                    amount_cents: 1000
      responses:
        '201':
          description: Capture created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TransactionDataResponse"
          headers:
            X-Idempotent-Replayed:
              description: Present and `true` when this response is a cached
                replay of an earlier request with the same Idempotency-Key.
              schema:
                type: string
                enum:
                - 'true'
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
          "$ref": "#/components/responses/Conflict"
        '422':
          "$ref": "#/components/responses/UnprocessableEntity"
  "/api/payment/v2026-04/transactions/{id}/void":
