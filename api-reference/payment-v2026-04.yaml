  "/api/payment/v2026-04/merchants/{merchant_id}/configuration":
    parameters:
    - name: merchant_id
      in: path
      required: true
      schema:
        type: integer
      description: Merchant ID or company ID (both are unique-indexed)
    get:
      operationId: showMerchantConfiguration
      summary: Get merchant payment configuration
      description: Returns VGS, Kount, 3DS acquirer, and payout settings for a merchant.
        Secret fields are obfuscated. API key auth is scoped to the authenticated
        merchant only.
      tags:
      - Merchant Configuration
      responses:
        '200':
          description: Merchant payment configuration
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MerchantConfigurationResponse"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
    patch:
      operationId: updateMerchantConfiguration
      summary: Update merchant payment configuration
      description: Updates VGS, Kount, 3DS acquirer, and/or payout settings. Obfuscated
        secret values (containing "********") are silently skipped to prevent overwriting
        real secrets. 3DS acquirer fields are merged into the network_3ds_setting
        JSONB. Payout fields are merged into payouts_settings JSONB. API key auth
        is scoped to the authenticated merchant only.
      tags:
      - Merchant Configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - configuration
              properties:
                configuration:
                  "$ref": "#/components/schemas/MerchantConfigurationUpdateRequest"
            examples:
              vgs:
                summary: Rotate VGS environment and enable network tokens
                value:
                  configuration:
                    vgs_environment: sandbox
                    network_tokens_enabled: true
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MerchantConfigurationResponse"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        # 422 stays inline: render_error_result returns { status, errors, meta },
        # which differs from the Action-pattern ErrorResponse shape
        # ({ error_message, errors, meta }) referenced by the shared
        # UnprocessableEntity response.
        '422':
          description: Validation error (field-level errors returned)
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - errors
                - meta
                properties:
                  status:
                    type: string
                    enum:
                    - error
                  errors:
                    "$ref": "#/components/schemas/ErrorBag"
                    description: Field-level error messages
                  meta:
                    "$ref": "#/components/schemas/Meta"
