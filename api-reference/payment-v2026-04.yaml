    get:
      operationId: showGateway
      summary: Get a gateway
      description: |
        Retrieves a single gateway by slug, UUID, or numeric ID. Read-only; secret
        values in `settings` are obfuscated. Returns `404` when no gateway matches the
        identifier for the authenticated merchant.
      tags:
      - Gateways
      responses:
        '200':
          description: Gateway details
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GatewayDataResponse"
        '401':
