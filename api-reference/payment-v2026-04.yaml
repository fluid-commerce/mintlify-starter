                  additionalProperties: false
                  properties:
                    metadata:
                      type: object
                      additionalProperties:
                        "$ref": "#/components/schemas/JsonValue"
            examples:
              void:
                summary: Void an authorization
                value: {}
      responses:
        '200':
          description: Void completed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TransactionDataResponse"
          headers:
            X-Idempotent-Replayed:
              description: Present and `true` when this response is a cached
                replay of an earlier request with the same Idempotency-Key.
              schema:
                type: string
                enum:
                - 'true'
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
