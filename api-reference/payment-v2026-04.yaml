        funds. Creates a `void` transaction linked via `parent_transaction_id` and
        returns it with `200`. Pass an `Idempotency-Key` header to make retries safe.
        Returns `404` when the authorization is not found, `409` on an in-flight
        duplicate key, and `422` when the authorization cannot be voided.
