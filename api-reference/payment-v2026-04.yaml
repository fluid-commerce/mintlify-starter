        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
    patch:
      operationId: updateGateway
      summary: Update a gateway
      description: |
        Updates an existing gateway. Only the fields present in the `gateway` payload
        are changed (PATCH semantics); omit `credentials` to preserve stored secrets.
        Returns `200` with the updated gateway. Returns `404` when the gateway does not
        exist and `422` on validation failure.
      tags:
      - Gateways
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - gateway
              properties:
                gateway:
                  "$ref": "#/components/schemas/GatewayUpdateRequest"
            examples:
              rename:
                summary: Rename a gateway and expand its country coverage
                value:
                  gateway:
                    name: Stripe (North America)
                    country_codes:
                    - US
                    - CA
      responses:
        '200':
          description: Gateway updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/GatewayDataResponse"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '422':
          "$ref": "#/components/responses/UnprocessableEntity"
    delete:
      operationId: destroyGateway
      summary: Delete a gateway
      description: |
        Deletes a gateway. Returns `204` with no body on success. Returns `404` when
        the gateway does not exist for the authenticated merchant.
      tags:
      - Gateways
      responses:
        '204':
          description: Gateway deleted
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
  "/api/payment/v2026-04/gateways/{id}/purchase":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: Gateway slug
    post:
      operationId: purchaseGateway
      summary: Create a purchase transaction
      description: |
        Charges the payment method immediately (authorize and capture in a single
        step) for `amount_cents` on the gateway. Creates a `purchase` transaction and
        returns it with `201`. Pass an `Idempotency-Key` header to make retries safe —
        a replay returns the original result with `X-Idempotent-Replayed: true`.
        Returns `404` when the gateway is not found, `409` when a request with the same
        key is still in flight, and `422` when the request fails validation.
      tags:
      - Gateways
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - transaction
              properties:
                transaction:
                  "$ref": "#/components/schemas/TransactionRequest"
            examples:
              purchase:
                summary: Charge $49.99 with a saved payment method
                value:
                  transaction:
                    amount_cents: 4999
                    currency_code: USD
                    payment_method_id: pm_9f8e7d6c
      responses:
        '201':
          description: Purchase created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TransactionDataResponse"
          headers:
            X-Idempotent-Replayed:
              description: Present and `true` when this response is a cached
                replay of an earlier request with the same Idempotency-Key.
              schema:
                type: string
                enum:
                - 'true'
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
          "$ref": "#/components/responses/Conflict"
        '422':
          "$ref": "#/components/responses/UnprocessableEntity"
  "/api/payment/v2026-04/gateways/{id}/authorize":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: Gateway slug
    post:
      operationId: authorizeGateway
      summary: Create an authorization
      description: |
        Authorizes (holds funds on) the payment method for `amount_cents` without
        capturing. Creates an `authorize` transaction and returns it with `201`;
        capture it later via the transaction capture endpoint or release it with void.
        Pass an `Idempotency-Key` header to make retries safe. Returns `404` when the
        gateway is not found, `409` on an in-flight duplicate key, and `422` when the
        request fails validation.
      tags:
      - Gateways
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - transaction
              properties:
                transaction:
                  "$ref": "#/components/schemas/TransactionRequest"
            examples:
              authorize:
                summary: Authorize $49.99 for later capture
                value:
                  transaction:
                    amount_cents: 4999
                    currency_code: USD
                    payment_method_id: pm_9f8e7d6c
      responses:
        '201':
          description: Authorization created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TransactionDataResponse"
          headers:
            X-Idempotent-Replayed:
              description: Present and `true` when this response is a cached
                replay of an earlier request with the same Idempotency-Key.
              schema:
                type: string
                enum:
                - 'true'
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
          "$ref": "#/components/responses/Conflict"
        '422':
          "$ref": "#/components/responses/UnprocessableEntity"
  "/api/payment/v2026-04/gateways/{id}/verify":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: Gateway slug
    post:
      operationId: verifyGateway
      summary: Verify a payment method ($0 auth)
      description: |
        Runs a zero-amount authorization to confirm a payment method is valid without
