  "/api/payment/v2026-04/transactions/{id}/credit":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: string
      description: Transaction slug (transaction to refund)
    post:
      operationId: creditTransaction
      summary: Credit/refund a transaction
      description: |
        Refunds or credits a prior transaction. Send `amount_cents` for a partial
        refund; omit it to refund the full amount. Partial refunds accumulate in the
        source transaction's `credited_amount_cents`. Creates a `refund`/
        `general_credit` transaction linked via `parent_transaction_id` and returns it
        with `201`. Pass an `Idempotency-Key` header to make retries safe. Returns
        `404` when the transaction is not found, `409` on an in-flight duplicate key,
        and `422` when the requested amount exceeds the refundable balance or the
        transaction cannot be refunded.
      tags:
      - Transactions
      parameters:
      - "$ref": "#/components/parameters/IdempotencyKey"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                transaction:
                  type: object
                  additionalProperties: false
                  properties:
                    amount_cents:
                      type: integer
                      minimum: 1
                      description: Partial refund amount (defaults to full transaction
                        amount)
                    metadata:
                      type: object
                      additionalProperties:
                        "$ref": "#/components/schemas/JsonValue"
            examples:
              full_refund:
                summary: Refund the full transaction amount
                value: {}
              partial_refund:
                summary: Partial refund of $10.00
                value:
                  transaction:
                    amount_cents: 1000
      responses:
        '201':
          description: Credit created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TransactionDataResponse"
          headers:
            X-Idempotent-Replayed:
              description: Present and `true` when this response is a cached
                replay of an earlier request with the same Idempotency-Key.
              schema:
                type: string
                enum:
                - 'true'
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        '409':
          "$ref": "#/components/responses/Conflict"
        '422':
          "$ref": "#/components/responses/UnprocessableEntity"
  "/api/payment/v2026-04/merchants/{merchant_id}/configuration":
    parameters:
    - name: merchant_id
      in: path
      required: true
      schema:
        type: integer
      description: Merchant ID or company ID (both are unique-indexed)
    get:
      operationId: showMerchantConfiguration
      summary: Get merchant payment configuration
      description: Returns VGS, Kount, 3DS acquirer, and payout settings for a merchant.
        Secret fields are obfuscated. API key auth is scoped to the authenticated
        merchant only.
      tags:
      - Merchant Configuration
      responses:
        '200':
          description: Merchant payment configuration
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MerchantConfigurationResponse"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
    patch:
      operationId: updateMerchantConfiguration
      summary: Update merchant payment configuration
      description: Updates VGS, Kount, 3DS acquirer, and/or payout settings. Obfuscated
        secret values (containing "********") are silently skipped to prevent overwriting
        real secrets. 3DS acquirer fields are merged into the network_3ds_setting
        JSONB. Payout fields are merged into payouts_settings JSONB. API key auth
        is scoped to the authenticated merchant only.
      tags:
      - Merchant Configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - configuration
              properties:
                configuration:
                  "$ref": "#/components/schemas/MerchantConfigurationUpdateRequest"
            examples:
              vgs:
                summary: Rotate VGS environment and enable network tokens
                value:
                  configuration:
                    vgs_environment: sandbox
                    network_tokens_enabled: true
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/MerchantConfigurationResponse"
        '400':
          "$ref": "#/components/responses/BadRequest"
        '401':
          "$ref": "#/components/responses/Unauthorized"
        '403':
          "$ref": "#/components/responses/Forbidden"
        '404':
          "$ref": "#/components/responses/NotFound"
        # 422 stays inline: render_error_result returns { status, errors, meta },
        # which differs from the Action-pattern ErrorResponse shape
        # ({ error_message, errors, meta }) referenced by the shared
        # UnprocessableEntity response.
        '422':
          description: Validation error (field-level errors returned)
          content:
            application/json:
              schema:
                type: object
                required:
                - status
                - errors
                - meta
                properties:
                  status:
                    type: string
                    enum:
                    - error
                  errors:
                    "$ref": "#/components/schemas/ErrorBag"
                    description: Field-level error messages
                  meta:
                    "$ref": "#/components/schemas/Meta"
