    SubscriptionDiscount:
      description: Subscription discount attachment rendered by SubscriptionDiscountBlueprinter
        (default view)
      type: object
      additionalProperties: false
      properties:
        # --- identity / foreign keys ---
        id:
          type: integer
        company_id:
          type: integer
        subscription_id:
          type: integer
        discount_id:
          type: integer
        discount_version_id:
          type: integer
        # attached_by_member_id is a UUID column, so it serializes as a string.
        attached_by_member_id:
          type: [string, 'null']
        attached_by_droplet_installation_id:
          type: [integer, 'null']
        # --- attachment state ---
        duration:
          type: string
          enum:
          - forever
          - once
          - repeating
        duration_cycles:
          type: [integer, 'null']
        applied_cycles:
          type: integer
        removed_reason:
          type: [string, 'null']
        removed_detail:
          type: [string, 'null']
        attached_via:
          type: string
        notes:
          type: [string, 'null']
        # --- timestamps ---
        starts_at:
          # Column is null: false - the blueprinter's &.iso8601 is defensive
          # style, not a real nullable.
          type: string
          format: date-time
        removed_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        # --- nested objects (fixed shape built in the blueprinter) ---
        discount:
          type: object
          additionalProperties: false
          properties:
            id:
              type: integer
            code:
              type: string
        discount_version:
          type: object
          additionalProperties: false
          properties:
            id:
              type: integer
            version_number:
              type: integer
            code:
              type: string
            price_discount_type:
              type: string
            flat_value:
              type: [number, 'null']
            percentage_value:
              type: [number, 'null']
            apply_to_volume:
              type: boolean
        attached_by:
          type: [object, 'null']
          properties:
            kind:
              type: string
              enum:
              - member
              - droplet_installation
