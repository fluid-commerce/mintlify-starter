          type: [string, 'null']
        subscription_price:
          type: [number, string, 'null']
        subscription_price_in_currency:
          type: [string, 'null']
        subscription_start:
          type: [string, 'null']
        subscribe_and_save:
          type: [number, string, 'null']
        subscribe_and_save_in_currency:
          type: [string, 'null']
        subscribe_and_save_for_display:
          type: [string, 'null']
        metadata:
          type: [object, 'null']
          # spec-accuracy: UNENFORCED open pocket - cart item metadata is a
          # free-form JSON blob (merges arbitrary cart_item.metadata keys)
          additionalProperties: true
        errors:
          type: array
          items:
            "$ref": "#/components/schemas/CheckoutCartItemError"
        subscription_plans:
          type: array
          items:
            "$ref": "#/components/schemas/CheckoutCartItemSubscriptionPlan"
    CheckoutExternalDiscount:
      description: External (third-party) discount metadata rendered by
        Commerce::CartBlueprinter#external_discount_metadata. `sources` is a map
        keyed by discount-source identifier.
      type: [object, 'null']
      additionalProperties: false
      properties:
        total:
          type: number
        calculated_at:
          type: [string, 'null']
          format: date-time
        sources:
          type: object
          description: Map of discount-source id -> source entry. Each entry
            carries at least a rounded `amount`.
          additionalProperties:
            type: object
            # spec-accuracy: UNENFORCED open pocket - source entries carry
            # provider-specific keys beyond `amount`; enumerate once cart tests
            # exercise a populated external discount
            additionalProperties: true
            properties:
              amount:
                type: [number, 'null']
    CheckoutCartPaymentMethod:
      description: Cart payment_method rendered by
        Commerce::CartBlueprinter::PaymentMethodFormatter. A closed polymorphic
        union across processors (CreditCard, Paypal, Affirm, Klarna, and a simple
        {id,type} fallback for all others). Nullable when the cart has no payment
        method.
      type: [object, 'null']
      additionalProperties: false
      properties:
        id:
          type: integer
        type:
          type: string
          description: Processor class (CreditCard, Paypal, Affirm, Klarna, Droplet, ...).
        # CreditCard-specific
        payment_method_type:
          type: [string, 'null']
        card_network:
          type: [string, 'null']
        last_four:
          type: [string, 'null']
        exp_month:
          type: [string, integer, 'null']
        exp_year:
          type: [string, integer, 'null']
        logo_url:
          type: [string, 'null']
        # Paypal / Affirm / Klarna status + payload fields
        status:
          type: [string, 'null']
        affirm_id:
          type: [string, integer, 'null']
        checkout_id:
          type: [string, integer, 'null']
        created:
          type: [string, integer, 'null']
        auth_expiration:
          type: [string, integer, 'null']
        currency:
          type: [string, 'null']
        amount:
          type: [number, string, 'null']
        session_id:
          type: [string, 'null']
        intent:
          type: [string, 'null']
        customer_details:
          type: object
          # spec-accuracy: UNENFORCED open pocket - buyer-supplied customer detail
          # blob (payment_method.metadata_get("customer_details")); shape is
          # processor/checkout-form defined
          additionalProperties: true
    CheckoutAvailablePaymentMethod:
      description: Available payment method entry rendered by
        Commerce::CartsService#available_payment_methods_as_hash. Common envelope
        fields are strictly typed; processor-specific fields vary by gateway.
      type: object
      # spec-accuracy: UNENFORCED open pocket - the field set beyond the common
      # envelope is processor-polymorphic across an open set of payment gateways;
      # the stable envelope + known gateway fields are typed, remaining
      # gateway-specific keys stay open
      additionalProperties: true
      required:
      - id
      - uuid
      - type
      - name
      - image_url
      - test
      - sandbox
      - customer_details_schema
      properties:
        id:
          type: integer
        uuid:
          type: string
        type:
          type: string
        name:
          type: string
        image_url:
          type: [string, 'null']
        test:
          type: boolean
        sandbox:
          type: boolean
        collect_billing_address:
          type: boolean
        customer_details_schema:
          description: Map of required customer-info fields keyed by field name
            (e.g. phone, document_id); each gateway's required_customer_info_schema
            emits entries of {label, type, required} (empty object for most
            gateways).
          type: object
          additionalProperties:
            type: object
            additionalProperties: false
            required:
            - label
            - type
            - required
            properties:
              label:
                type: string
              type:
                type: string
              required:
                type: boolean
        # --- known gateway-specific fields (optional) ---
        supported_brands:
          type: array
          items:
            type: string
        token_provider:
          type: [string, 'null']
        tokenize_path:
          type: [string, 'null']
        bogus_gateway:
          type: boolean
        apple_pay:
          type: boolean
        apple_pay_recurring_supported:
          type: boolean
        apple_pay_merchant_identifier:
          type: [string, 'null']
        client_id:
          type: [string, 'null']
        merchant_id:
          type: [string, 'null']
        sdk_type:
          type: [string, 'null']
        decrypted_apple_pay_via_paypal:
          type: boolean
        integration_key:
          type: [string, 'null']
paths:
  "/api/checkout/v2026-04/carts":
    post:
      summary: Create a cart
      tags:
      - carts
      operationId: checkout_v2026_04_create_cart
      responses:
        '400':
          description: Missing or blank fluid_shop, or a malformed request the create action
            rejects as a bad request (invalid attribution, unresolvable on-behalf
            member).
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '404':
          description: The fluid_shop subdomain does not resolve to a company.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '422':
          description: Request failed schema validation (e.g. missing country_code), a
            re-enrollment was blocked, every requested item was unavailable, or
            the cart could not be persisted.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CartResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                fluid_shop:
                  type: string
                  description: Company subdomain
                  example: acme
                country_code:
                  type: string
                  description: ISO country code
                  example: US
                attribution:
                  type: [object, 'null']
                  additionalProperties: false
                  description: Attribution source (dry-schema CreateAction params_schema).
                  properties:
                    share_guid:
                      type: string
                    email:
                      type: string
                    external_id:
                      type: string
                    username:
                      type: string
                    fluid_rep_id:
                      type: [string, integer]
                items:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    required:
                    - variant_id
                    - quantity
                    properties:
                      variant_id:
                        type: integer
                      quantity:
                        type: integer
                      subscription:
                        type: boolean
                      subscription_plan_id:
                        type: integer
                      cv:
                        type: integer
                      qv:
                        type: integer
                      price:
                        type: integer
                      bundled_items:
                        type: array
                        description: Dynamic-bundle child selections (mirrors AddItemsAction).
                        items:
                          type: object
                          additionalProperties: false
                          required:
                          - variant_id
                          - quantity
                          properties:
                            variant_id:
                              type: integer
                            quantity:
                              type: integer
                              minimum: 0
                            display_to_customer:
                              type: boolean
                            subscription:
                              type: [boolean, 'null']
                            subscription_plan_id:
                              type: [integer, 'null']
                            product_bundle_group_id:
                              type: [integer, 'null']
                # Non-nullable fields below use .value(...) in CreateAction's
                # params_schema - explicit null fails dry-validation with 422.
                # Only the .maybe fields (volume_rep_id, perform_cart_calculations,
                # member_id, customer_id) accept null.
                enrollment_pack_id:
                  type: integer
                volume_rep_id:
                  type: [integer, 'null']
                origin_url:
                  type: string
                visitor_token:
                  type: string
                fairshare_id:
                  type: string
                session_uuid:
                  type: string
                order_confirmation_url:
                  type: string
                order_failure_url:
                  type: string
                immutable_items:
                  type: boolean
                perform_cart_calculations:
                  type: [boolean, 'null']
                source:
                  type: string
                timezone:
                  type: string
                member_id:
                  type: [string, 'null']
                  description: Admin on-behalf ordering — the member the cart is created
                    for.
                customer_id:
                  type: [integer, 'null']
                  description: Deprecated alias for the buyer; still accepted.
              required:
              - fluid_shop
              - country_code
      security: []
  "/api/checkout/v2026-04/carts/{cart_token}/auth":
    delete:
      summary: Logout from cart
      tags:
      - cart-auth
      operationId: checkout_v2026_04_destroy_cart_auth
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '410':
          description: Authorized enrollment cart is locked
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LockedCartErrorResponse"
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CheckoutCartAuthResponse"
      security:
      - bearer_auth: []
  "/api/checkout/v2026-04/carts/{cart_token}/auth/magic_link":
    post:
      summary: Send magic link
      tags:
      - cart-auth
      operationId: checkout_v2026_04_send_cart_magic_link
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '410':
          description: Authorized enrollment cart is locked
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LockedCartErrorResponse"
        '404':
          description: Cart not found, or (for lookup_only probes) no existing customer
            for the email — the frontend treats this as a guest and skips the confirmation
            step
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '201':
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CheckoutCartMagicLinkChallengeResponse"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Customer email to send magic link to
                  example: customer@example.com
                fluid_shop:
                  type: string
                  description: Company subdomain
                  example: acme
                lookup_only:
                  type: boolean
                  description: Returning-buyer probe. When true, only looks up an existing
                    customer and never creates one; a not-found (404) tells the frontend
                    to treat the email as a guest and skip the confirmation step.
              required:
              - email
              - fluid_shop
              additionalProperties: false
      security:
      - bearer_auth: []
  "/api/checkout/v2026-04/carts/{cart_token}/auth/me":
    get:
      summary: Get current customer for cart
      tags:
      - cart-auth
      operationId: checkout_v2026_04_get_cart_auth_me
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CheckoutCartAuthIdentityResponse"
      security:
      - bearer_auth: []
  "/api/checkout/v2026-04/carts/{cart_token}/auth/verify":
    post:
      summary: Verify magic link
      tags:
      - cart-auth
      operationId: checkout_v2026_04_verify_cart_magic_link
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '410':
          description: Authorized enrollment cart is locked
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/LockedCartErrorResponse"
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CheckoutCartMagicLinkVerificationResponse"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                uuid:
                  type: string
                  description: MFA challenge UUID returned by the magic_link request
                multi_factor_authentication:
                  type: object
                  additionalProperties: false
                  properties:
                    verification_code:
                      type: string
                      description: The verification code the customer received
                  required:
                  - verification_code
              required:
              - uuid
              - multi_factor_authentication
      security:
      - bearer_auth: []
  "/api/checkout/v2026-04/carts/{cart_token}/discount":
    post:
      summary: Apply discount code
      tags:
      - cart-discount
      operationId: checkout_v2026_04_apply_cart_discount
      description: Applies a discount code to the cart. Not idempotent — applying
        the same code twice returns an error.
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '410':
          "$ref": "#/components/responses/ProcessedCartResponse"
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CartResponse"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                discount_code:
                  type: string
                  description: Discount code to apply
                  example: SAVE10
              required:
              - discount_code
      security:
      - bearer_auth: []
    delete:
      summary: Remove discount code
      tags:
      - cart-discount
      operationId: checkout_v2026_04_remove_cart_discount
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '410':
          "$ref": "#/components/responses/ProcessedCartResponse"
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CartResponse"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                discount_code:
                  type: string
                  description: Discount code to remove
              required:
              - discount_code
      security:
      - bearer_auth: []
  "/api/checkout/v2026-04/carts/{cart_token}/discount/manual":
    post:
      summary: Apply manual discount (admin only)
      tags:
      - cart-discount
      operationId: checkout_v2026_04_apply_manual_discount
      description: Creates a one-time manual discount and applies it to the cart.
        Requires admin authentication (root_or_admin? role). Manual discounts are
        single-use, require a reason, and are excluded from the promo code management
        UI.
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '410':
          "$ref": "#/components/responses/ProcessedCartResponse"
        '200':
          description: Discount created and applied
          content:
            application/json:
              schema:
                allOf:
                - "$ref": "#/components/schemas/CartResponse"
                - type: object
                  properties:
                    meta:
                      type: object
                      properties:
                        totals_stale:
                          type: boolean
                          description: Present and true when cart recalculation failed
                            after the discount was applied. The discount is linked
                            but totals may be outdated.
        '401':
          description: Unauthorized — missing/invalid JWT or non-admin role
          content:
            application/json:
              schema:
                anyOf:
                - "$ref": "#/components/schemas/UnauthorizedResponse"
                - type: object
                  properties:
                    errors:
                      type: object
                      properties:
                        auth:
                          type: array
                          items:
                            type: string
                          example:
                          - admin authentication required
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
                  description: Explanation for the manual discount (required)
                  example: VIP customer courtesy
                price_discount_type:
                  type: string
                  enum:
                  - flat
                  - percentage
                  description: Discount type
                  example: flat
                flat_value:
                  type: number
                  format: float
                  description: Dollar amount (required when price_discount_type is
                    flat)
                  example: 10.0
                percentage_value:
                  type: number
                  format: float
                  description: Percentage 0-100 (required when price_discount_type
                    is percentage)
                  example: 15.0
                applicable_for:
                  type: string
                  enum:
                  - everything
                  - specific_products
                  - specific_collections
                  - except_specific_products
                  description: Product targeting scope
                apply_to_subscriptions:
                  type: boolean
                  default: false
                  description: Whether the discount applies to subscription line items in the current cart
                apply_to_recurring_subscription_orders:
                  type: boolean
                  description: Whether the discount carries forward to recurring orders spawned from the cart. Requires apply_to_subscriptions to be true. When omitted, defaults to the value of apply_to_subscriptions.
                apply_to_volume:
                  type: boolean
                  default: false
                  description: Whether the discount reduces QV/CV totals
              required:
              - reason
              - price_discount_type
      security:
      - bearer_auth: []
  "/api/checkout/v2026-04/carts/{cart_token}/discounts":
    get:
      summary: List all discounts applied to a cart
      tags:
      - cart-discount
      operationId: checkout_v2026_04_list_cart_discounts
      description: Returns per-discount detail for all active discounts on a cart,
        including code, reason, type, defined value, and actual amount applied.
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '200':
          description: Discounts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                - discounts
                properties:
                  discounts:
                    type: array
                    items:
                      type: object
                      additionalProperties: false
                      required:
                      - code
                      - source
                      - type
                      - automatic
                      - applicable_for
                      - discount_value
                      - discount_value_formatted
                      - amount_applied
                      - amount_applied_in_currency
                      - apply_to_volume
                      - qv_deducted
                      - cv_deducted
                      properties:
                        code:
                          type: string
                          description: The discount promo code
                        reason:
                          type:
                          - string
                          - 'null'
                          description: Reason for the discount (present for manual
                            discounts)
                        source:
                          type: string
                          enum:
                          - promo
                          - manual
                          - droplet
                          description: Whether the discount is a promo code, manually
                            applied, or droplet-managed
                        type:
                          type: string
                          enum:
                          - flat
                          - percentage
                          - free_product
                          - free_shipping
                          description: The discount type
                        automatic:
                          type: boolean
                          description: Whether the discount was automatically applied
                        applicable_for:
                          type: string
                          enum:
                          - everything
                          - specific_products
                          - specific_collections
                          - except_specific_products
                          description: What the discount applies to
                        discount_value:
                          type:
                          - number
                          - 'null'
                          description: The defined discount value (flat amount or
                            percentage). Null for free_product and free_shipping types
                        discount_value_formatted:
                          type:
                          - string
                          - 'null'
                          description: Human-readable discount value (e.g. "$10.00"
                            or "15%")
                        amount_applied:
                          type: number
                          description: Actual monetary amount deducted from this cart
                        amount_applied_in_currency:
                          type: string
                          description: Formatted amount applied in the cart's currency
                        apply_to_volume:
                          type: boolean
                          description: Whether this discount affects volume points (QV/CV)
                        qv_deducted:
                          type: integer
                          minimum: 0
                          description: Qualifying volume points deducted by this discount
                            (non-negative; caller applies the minus sign for display)
                        cv_deducted:
                          type: integer
                          minimum: 0
                          description: Commissionable volume points deducted by this discount
                            (non-negative; caller applies the minus sign for display)
                  meta:
                    "$ref": "#/components/schemas/Meta"
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      security:
      - bearer_auth: []
  "/api/checkout/v2026-04/carts/{cart_token}/items":
    post:
      summary: Add items to cart
      tags:
      - cart-items
      operationId: checkout_v2026_04_add_cart_items
      parameters:
      - name: cart_token
        in: path
        required: true
        description: Cart token
        schema:
          type: string
      responses:
        '410':
          "$ref": "#/components/responses/ProcessedCartResponse"
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CartResponse"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                items:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      variant_id:
                        type: integer
                        description: Variant ID
                      cart_item_id:
                        type: integer
                        description: Existing cart item ID (update within add)
                      quantity:
                        type: integer
                        description: Quantity
                      subscription:
                        type: boolean
                        description: Whether item is a subscription
                      subscription_plan_id:
                        type: integer
                        description: Subscription plan ID
                      enrollment_pack_id:
                        type: integer
                        description: Enrollment pack ID
                      price:
                        type: number
                        format: decimal
                        description: Override price (admin only)
                      cv:
                        type: integer
                        description: Override CV value (admin only)
                      qv:
                        type: integer
                        description: Override QV value (admin only)
                      title:
                        type: string
                        description: Item title override
                      image_url:
                        type: string
                        description: Item image URL
                      display_to_customer:
                        type: boolean
                        description: Whether to display item to customer
                      bundled_items:
                        type: array
                        description: Bundle group selections for bundle products
                        items:
                          type: object
                          additionalProperties: false
                          properties:
                            variant_id:
                              type: integer
                              description: Variant ID of the bundled item
                            quantity:
                              type: integer
                              minimum: 0
                              description: Quantity of the bundled item
                            display_to_customer:
                              type: boolean
                              description: Whether to display bundled item to customer
                            subscription:
                              type: [boolean, 'null']
