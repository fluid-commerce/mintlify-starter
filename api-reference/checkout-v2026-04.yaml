      summary: Create customer payment method
      tags:
      - customer-payment-methods
      operationId: checkout_v2026_04_create_customer_payment_method
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/CheckoutCustomerPaymentMethodCreateResponse"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - type
              - country_code
              - payment_method
              properties:
                type:
                  type: string
                  description: Payment method type
                  example: credit_card
                country_code:
                  type: string
                  description: ISO country code for the checkout country
                  example: US
                payment_method:
                  type: object
                  additionalProperties: false
                  required:
                  - token
                  properties:
                    token:
                      type: string
                      description: Tokenized payment credential
                    token_provider:
                      type: string
                      description: Token provider identifier
                    cvv_token:
                      type: string
                      description: Tokenized CVV credential
                    exp_month:
                      type: integer
                      example: 12
                    exp_year:
                      type: integer
                      example: 2028
                    card_holder:
                      type: string
                      description: Cardholder name
                    payment_account_id:
                      description: Payment account ID override
                    bin:
                      type:
                      - string
                      - 'null'
                      description: First six digits of the card number forwarded from VGS Collect for brand/BIN persistence.
                      example: '424242'
                    last_four:
                      type:
                      - string
                      - 'null'
                      description: Last four digits of the card number, forwarded from VGS Collect for display persistence.
                      example: '4242'
                    card_network:
                      type:
                      - string
                      - 'null'
                      description: Card network (e.g. visa, mastercard) forwarded from VGS Collect for brand persistence.
                      example: visa
                default_payment_method:
                  type: boolean
                  description: Whether to set this as the default payment method
                billing_address:
                  type: object
                  additionalProperties: false
                  required:
                  - address1
                  - city
                  - state
                  - zip
                  - country_code
                  properties:
                    address1:
                      type: [string, 'null']
                    address2:
                      type: [string, 'null']
                    city:
                      type: [string, 'null']
                    state:
                      type: [string, 'null']
                    zip:
                      type: [string, 'null']
                    country_code:
                      type: [string, 'null']
                      example: US
                    name:
                      type: [string, 'null']
                browser_info:
                  type: object
                  # spec-accuracy: UNENFORCED open pocket - the server accepts
                  # any hash (optional(:browser_info).value(:hash), no inner
                  # key schema), so closing this would reject bodies the API
                  # takes. Documented properties are hints, not a contract.
                  additionalProperties: true
                  description: Flat browser device fingerprint for 3DS
                    authentication, as produced by the checkout client's
                    getBrowserInfo() (fluid-pay-core browserInfoSchema).
                  properties:
                    color_depth:
                      type: [integer, 'null']
                      example: 24
                    screen_height:
                      type: [integer, 'null']
                      example: 1080
                    screen_width:
                      type: [integer, 'null']
                      example: 1920
                    time_zone:
                      type: [integer, 'null']
                      description: Timezone offset in minutes (Date#getTimezoneOffset)
                      example: -300
                    java_enabled:
                      type: [boolean, 'null']
                    java_script_enabled:
                      type: [boolean, 'null']
                    language:
                      type: [string, 'null']
                      example: en-US
                    user_agent:
                      type: [string, 'null']
                    accept_header:
                      type: [string, 'null']
                      example: "*/*"
                payment_account:
                  type: [string, 'null']
                  description: Payment account UUID override
                set_customer_payment_method:
                  type: boolean
                  description: When true, binds the payment method to the customer rather than the FluidPay account
