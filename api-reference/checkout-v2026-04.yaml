  "/api/checkout/v2026-04/customers/me/addresses/{id}/apply_to_subscriptions":
    post:
      summary: Apply address to subscriptions
      description: |
        Apply the specified address to the customer's subscriptions.
        Pass `apply_to_all: true` to update all subscriptions, or pass
        a `subscription_ids` array to update specific subscriptions only.
      tags:
      - customer-addresses
      operationId: checkout_v2026_04_apply_address_to_subscriptions
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        required: true
        description: Address ID
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                apply_to_all:
                  type: boolean
                  description: When true, apply the address to all eligible subscriptions
                    (active, past_due, or paused). Cancelled subscriptions are not affected.
                    Mutually exclusive with subscription_ids.
                subscription_ids:
                  type: array
                  description: IDs of specific subscriptions to update. Mutually
                    exclusive with apply_to_all.
                  items:
                    type: integer
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  affected_count:
                    type: integer
                    description: Number of subscriptions updated
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                type: object
                required:
                - error_message
                - errors
                - meta
                properties:
                  error_message:
                    type: string
                  type:
                    type: string
                    description: Machine-readable error type (e.g. unauthorized_subscriptions)
                  errors:
                    type: object
                    additionalProperties:
                      anyOf:
                      - type: string
                      - type: integer
                      - type: array
                        items:
                          anyOf:
                          - type: string
                          - type: integer
                      - type: object
                  meta:
                    "$ref": "#/components/schemas/Meta"
