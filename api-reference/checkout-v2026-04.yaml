  "/api/checkout/v2026-04/subscriptions/{token}/failed-cycle-waiver":
    get:
      summary: Preview a failed-cycle waiver
      description: Returns the authoritative future billing and shipping timestamps
        that would be restored if the exhausted failed cycle were waived. An
        ineligible subscription returns 200 with eligible false and null dates.
      tags:
      - subscriptions
      operationId: checkout_v2026_04_failed_cycle_waiver_preview
      security:
      - bearer_auth: []
      parameters:
      - name: token
        in: path
        required: true
        description: Subscription token
        schema:
          type: string
      responses:
        '200':
          description: Authoritative waiver eligibility and restored schedule
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FailedCycleWaiverPreviewResponse"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '404':
          description: Subscription not found or not owned by the authenticated customer
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
    post:
      summary: Skip the exhausted failed cycle
      description: Waives the missed billing and shipping cycle without collecting
        payment and without creating an order or shipment. The missed shipment is
        skipped. The subscription's original billing and shipping cadence and anchors
        are preserved, and each stored next date is advanced independently only as
        needed to reach a future local date.
      tags:
      - subscriptions
      operationId: checkout_v2026_04_failed_cycle_waiver_create
      security:
      - bearer_auth: []
      parameters:
      - name: token
        in: path
        required: true
        description: Subscription token
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        '200':
          description: Failed cycle waived and future schedule restored
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/FailedCycleWaiverMutationResponse"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '404':
          description: Subscription not found or not owned by the authenticated customer
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '422':
          description: Subscription state changed or the waiver could not be persisted
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
