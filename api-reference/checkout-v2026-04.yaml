  "/api/checkout/v2026-04/customers/me/orders":
    get:
      summary: List customer orders
      tags:
      - customer-orders
      operationId: checkout_v2026_04_list_customer_orders
      security:
      - bearer_auth: []
      description: Returns the authenticated customer's order history with cursor
        pagination.
      parameters:
      - name: page[cursor]
        in: query
        required: false
        description: Pagination cursor
        schema:
          type: string
      - name: page[limit]
        in: query
        required: false
        description: Number of records per page (max 100)
        schema:
          type: integer
      - name: search
        in: query
        required: false
        description: Free-text search across order number, customer name/email/phone,
          external id, and order id/number
        schema:
          type: string
      - name: sort
        in: query
        required: false
        description: Sort key; prefix with '-' for descending
        schema:
          type: string
          enum:
          - sale_date
          - -sale_date
          - created_at
          - -created_at
          - id
          - -id
          - order_status
          - -order_status
          - status
          - -status
          - customer_name
          - -customer_name
          - customer
          - -customer
          - amount
          - -amount
      - name: status
        in: query
        required: false
        description: Filter by order status ('all' returns every status)
        schema:
          type: string
          enum:
          - all
          - draft
          - pending
          - pending_review
          - processing
          - completed
          - cancelled
          - archived
      - name: type
        in: query
        required: false
        description: Filter by order class
        schema:
          type: string
          enum:
          - sample_order
          - customer_order
          - member_order
          - enrollment_order
          - autoship_order
      - name: customer_id
        in: query
        required: false
        description: Filter by customer id
        schema:
          type: integer
      - name: user_company_id
        in: query
        required: false
        description: Filter by user company id
        schema:
          type: integer
      - name: subscription_id
        in: query
        required: false
        description: Filter by subscription id
        schema:
          type: integer
      - name: start_date
        in: query
        required: false
        description: Include orders on or after this date
        schema:
          type: string
          format: date
      - name: end_date
        in: query
        required: false
        description: Include orders on or before this date
        schema:
          type: string
          format: date
      - name: timezone
        in: query
        required: false
        description: Timezone for date-range filtering
        schema:
          type: string
      - name: within_days
        in: query
        required: false
        description: Include orders within the last N days
        schema:
          type: integer
      - name: cart_source
        in: query
        required: false
        description: Filter by cart source
        schema:
          type: string
      - name: country_isos
        in: query
        required: false
        description: Comma-separated country ISO codes to filter by
        schema:
          type: string
      - name: force_stats
        in: query
        required: false
        description: Force recomputation of aggregate stats
        schema:
          type: boolean
      - name: order_number
        in: query
        required: false
        description: Filter by exact order number
        schema:
          type: string
