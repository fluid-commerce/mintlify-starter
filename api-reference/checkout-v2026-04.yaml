---
openapi: 3.1.0
info:
  title: Fluid Checkout API
  version: v2026-04
  contact:
    email: support@fluid.app
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
- url: https://api.fluid.app
tags:
- name: carts
  description: Create, read, and mutate checkout carts (email, address, country,
    language, shipping, recalculation, completion).
- name: cart-auth
  description: Cart-scoped customer authentication — magic-link challenge, verification,
    identity, and logout.
- name: cart-discount
  description: Apply, list, and remove cart discount codes, including admin manual
    discounts.
- name: cart-items
  description: Add, update, and remove line items on a cart.
- name: cart-points
  description: Apply and remove loyalty points on a cart.
- name: customers
  description: The authenticated customer's profile and company memberships.
- name: customer-addresses
  description: The authenticated customer's saved shipping/billing addresses.
- name: customer-orders
  description: The authenticated customer's order history.
- name: customer-payment-methods
  description: The authenticated customer's saved payment methods and tokenization.
- name: customer-points
  description: The authenticated customer's loyalty point balances.
- name: directory
  description: Company rep and user directory lookups.
- name: enrollments
  description: Public enrollment forms — retrieve a form and submit, update, or upload
    field answers.
- name: orders
  description: Public order lookup by token.
- name: products
  description: Public product queries for the storefront checkout.
- name: store
  description: Store-level checkout configuration — countries, languages, address
    fields, agreements, drop zones, and Apple Pay domain verification.
- name: subscriptions
  description: Manage subscriptions — pause, resume, skip, cancel, reactivate, retry,
    and failed-cycle waivers.
- name: subscription-bundles
  description: List and create subscription bundles.
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      description: Bearer token authentication
  responses:
    ProcessedCartResponse:
      description: >-
        The cart is locked and can no longer be modified. Cart-mutation endpoints
        return this when the cart has already been processed (converted to an
        order) or, for enrollment carts, is in an authorized payment state. The
        body carries the full cart plus the store URL so the client can display
        the locked cart and redirect.
      content:
        application/json:
          schema:
            "$ref": "#/components/schemas/LockedCartErrorResponse"
  schemas:
    Meta:
      type: object
      properties:
        request_id:
          type:
          - string
          - 'null'
        timestamp:
          type: string
          format: date-time
    # Strict variant of Meta for endpoints whose meta is exactly
    # ControllerAction#default_meta ({request_id, timestamp}) with no
    # endpoint-specific extras. Schemas whose meta carries extra keys
    # (e.g. shop_url, pagination, stats) must type their own meta instead.
    CheckoutMeta:
      type: object
      additionalProperties: false
      required:
      - request_id
      - timestamp
      properties:
        request_id:
          type:
          - string
          - 'null'
        timestamp:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
      - error_message
      - errors
      - meta
      properties:
        error_message:
          type: string
        errors:
          "$ref": "#/components/schemas/ErrorBag"
        meta:
          "$ref": "#/components/schemas/CheckoutMeta"
    LockedCartErrorResponse:
      type: object
      additionalProperties: false
      required:
      - error_message
      - errors
      - meta
      properties:
        error_message:
          type: string
        errors:
          "$ref": "#/components/schemas/ErrorBag"
        meta:
          type: object
          additionalProperties: false
          required:
          - request_id
          - timestamp
          - shop_url
          - cart
          properties:
            request_id:
              type:
              - string
              - 'null'
            timestamp:
              type: string
              format: date-time
            shop_url:
              type: string
            cart:
              "$ref": "#/components/schemas/CartResponse/properties/cart"
    UnauthorizedResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    FailedCycleWaiverPreview:
      description: Authoritative schedule preview for abandoning an exhausted failed cycle.
      type: object
      additionalProperties: false
      required:
      - eligible
      - next_bill_date
      - next_ship_date
      properties:
        eligible:
          type: boolean
          description: Whether the subscription can waive its exhausted failed cycle now.
        next_bill_date:
          type:
          - string
          - 'null'
          format: date-time
          description: Restored billing timestamp, or null when the subscription is ineligible.
        next_ship_date:
          type:
          - string
          - 'null'
          format: date-time
          description: Restored shipping timestamp, or null when the subscription is ineligible.
    FailedCycleWaiverPreviewResponse:
      type: object
      additionalProperties: false
      required:
      - failed_cycle_waiver
      - meta
      properties:
        failed_cycle_waiver:
          "$ref": "#/components/schemas/FailedCycleWaiverPreview"
        meta:
          "$ref": "#/components/schemas/CheckoutMeta"
    FailedCycleWaiverMutationResponse:
      allOf:
      - "$ref": "#/components/schemas/SubscriptionResponse"
      - type: object
        required:
        - subscription
        - meta
        properties:
          subscription:
            type: object
            required:
            - status
            - next_bill_date
            - next_ship_date
            properties:
              status:
                type: string
                enum:
                - active
              next_bill_date:
                type: string
                format: date-time
              next_ship_date:
                type: string
                format: date-time
    SubscriptionRetryResponse:
      allOf:
      - "$ref": "#/components/schemas/SubscriptionResponse"
      - type: object
        required:
        - queued
        - meta
        properties:
          queued:
            type: boolean
            description: True when a past-due subscription was queued for immediate retry.
    CartResponse:
      description: Cart response wrapper (CartBlueprinter with_associations view).
        Scalar totals, flags, and points are strictly typed; genuinely dynamic
        fields (metadata, processor-specific payment payloads) and nested
        associations (items, addresses, country, company) are typed as open
        pockets and tightened in follow-up work.
      type: object
      required:
      - cart
      - meta
      additionalProperties: false
      properties:
        cart:
          type: object
          additionalProperties: false
          properties:
            # --- identity / enums ---
            id:
              type: integer
            cart_token:
              type: string
            state:
              type: string
            type:
              type: [string, 'null']
            email:
              type: [string, 'null']
            phone:
              type: [string, 'null']
            language_iso:
              type: [string, 'null']
            currency_code:
              type: [string, 'null']
            currency_symbol:
              type: string
            currency_decimal_places:
              type: integer
            customer_id:
              type: [integer, 'null']
            buyer_rep_id:
              type: [integer, 'null']
            enrollment_pack_id:
              type: [integer, 'null']
            processed:
              type: boolean
            email_marketing:
              type: [boolean, 'null']
            sms_marketing:
              type: [boolean, 'null']
            cv_total:
              type: [integer, 'null']
            qv_total:
              type: [integer, 'null']
            # --- money (round_for_currency -> number) ---
            amount_total:
              type: number
            sub_total:
              type: number
            tax_total:
              type: number
            shipping_total:
              type: number
            discount_total:
              type: number
            subtotal_after_discounts:
              type: number
            transaction_fee:
              type: number
            enrollment_fee:
              type: [number, string, 'null']
            inclusive_shipping_tax:
              type: number
            shipping_discount:
              type: number
            remaining_cart_amount_after_points:
              type: number
            # --- money display (display_price -> string) ---
            amount_total_in_currency:
              type: string
            sub_total_in_currency:
              type: string
            tax_total_in_currency:
              type: string
            shipping_total_in_currency:
              type: string
            discount_total_in_currency:
              type: string
            subtotal_after_discounts_in_currency:
              type: string
            transaction_fee_in_currency:
              type: string
            enrollment_fee_in_currency:
              type: string
            customer_total_points_in_currency:
              type: string
            points_applied_amount_in_currency:
              type: string
            remaining_customer_points_amount_in_currency:
              type: string
            remaining_cart_amount_after_points_in_currency:
              type: string
            tax_total_for_display:
              type: string
            shipping_total_for_display:
              type: string
            # --- booleans ---
            tax_exempt:
              type: boolean
            digital_only:
              type: boolean
            immutable_items:
              type: boolean
            points_enabled:
              type: boolean
            price_inclusive_of_tax:
              type: boolean
            requires_3ds:
              type: boolean
            requires_payment_method:
              type: boolean
            vault_without_charge:
              type: boolean
            valid_for_checkout:
              type: boolean
            valid_for_checkout_pre_payment:
              type: boolean
            payment_method_auto_assignable:
              type: boolean
            # --- points (integer) ---
            customer_total_points:
              type: integer
            points_applied:
              type: integer
            remaining_customer_points:
              type: integer
            max_applicable_points:
              type: integer
            total_creditable_points:
              type: integer
            # --- display-ready totals decomposition (Commerce::Totals) ---
            totals:
              type: object
              additionalProperties: false
              required:
              - gross_subtotal
              - gross_subtotal_in_currency
              - net_subtotal
              - net_subtotal_in_currency
              - item_tax
              - item_tax_in_currency
              - shipping_net
              - shipping_net_in_currency
              - shipping_tax
              - shipping_tax_in_currency
              - total_tax
              - total_tax_in_currency
              - price_inclusive_of_tax
              - tax_label
              description: >-
                Display-ready totals breakdown sourced from Commerce::Totals
                (STU2-2580). Decomposes the inclusive-tax figures so clients
                render the net subtotal, item tax, shipping net and shipping VAT
                without re-deriving them. Each money component carries a raw
                boundary-rounded decimal string plus its currency-formatted
                `_in_currency` sibling.
              properties:
                gross_subtotal:
                  type: string
                  description: Catalog sum of line-item prices (customer display).
                gross_subtotal_in_currency:
                  type: string
                net_subtotal:
                  type: string
                  description: Items subtotal excluding embedded item tax.
                net_subtotal_in_currency:
                  type: string
                item_tax:
                  type: string
                  description: Embedded tax attributable to the items.
                item_tax_in_currency:
                  type: string
                shipping_net:
                  type: string
                  description: Shipping charge excluding embedded shipping tax.
                shipping_net_in_currency:
                  type: string
                shipping_tax:
                  type: string
                  description: Embedded tax attributable to shipping.
                shipping_tax_in_currency:
                  type: string
                total_tax:
                  type: string
                  description: Combined item and shipping tax.
                total_tax_in_currency:
                  type: string
                price_inclusive_of_tax:
                  type: boolean
                  description: Whether catalog prices include tax.
                tax_label:
                  type: [string, 'null']
                  description: The resolved tax-line label (e.g. "VAT"), or null.
            # --- misc scalars ---
            price_inclusive_tax_name:
              type: [string, 'null']
            payment_account:
              type: [string, 'null']
            discount_codes:
              type: array
              items:
                type: string
            product_discount_codes:
              type: array
              items:
                type: string
            shipping_discount_codes:
              type: array
              items:
                type: string
            # --- small structured (strict) ---
            buyer_rep:
              type: [object, 'null']
              additionalProperties: false
              properties:
                id:
                  type: integer
                email:
                  type: [string, 'null']
                full_name:
                  type: [string, 'null']
                image_url:
                  type: [string, 'null']
                external_id:
                  type: [string, 'null']
            volume_rep:
              type: [object, 'null']
              additionalProperties: false
              properties:
                id:
                  type: integer
                email:
                  type: [string, 'null']
                full_name:
                  type: [string, 'null']
                image_url:
                  type: [string, 'null']
            shipping_method:
              type: [object, 'null']
              additionalProperties: false
              properties:
                id:
                  type: string
                name:
                  type: string
            discount_breakdown:
              type: object
              additionalProperties: false
              properties:
                internal_discounts:
                  type: number
                external_discounts:
                  type: number
                total_discounts:
                  type: number
            available_shipping_methods:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: [integer, string]
                  title:
                    type: [string, 'null']
                  price:
                    type: [number, string, 'null']
                  delivery_time_estimate:
                    type: [string, 'null']
                  price_label:
                    type: [string, 'null']
            # --- open pockets: genuinely shapeless JSONB blobs (see report) ---
            metadata:
              type: [object, 'null']
              # spec-accuracy: UNENFORCED open pocket - carts.metadata is a free-form
              # JSONB blob (arbitrary user/system-defined key/value); no fixed schema
              additionalProperties: true
            messages:
            # spec-accuracy: UNENFORCED open pocket - carts.messages is a free-form
            # JSONB blob (dynamically-keyed validation/info messages); no fixed schema
              "$ref": "#/components/schemas/JsonValue"
            # --- strictly typed via shared components ---
            payment_method:
              "$ref": "#/components/schemas/CheckoutCartPaymentMethod"
            available_payment_methods:
              type: array
              items:
                "$ref": "#/components/schemas/CheckoutAvailablePaymentMethod"
            external_discount:
              "$ref": "#/components/schemas/CheckoutExternalDiscount"
            shipping_address:
              "$ref": "#/components/schemas/CheckoutAddressData"
            billing_address:
              "$ref": "#/components/schemas/CheckoutAddressData"
            # --- nested associations (strictly typed via shared components) ---
            items:
              type: array
              items:
                "$ref": "#/components/schemas/CheckoutCartItem"
            ship_to:
              # Nullable when the cart has no shipping address; shape is the
              # shared CheckoutAddress (AddressBlueprinter default view).
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutAddress"
            bill_to:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutAddress"
            attribution:
              "$ref": "#/components/schemas/CheckoutAttribution"
            agreements:
              type: array
              items:
                "$ref": "#/components/schemas/CheckoutAgreement"
            country:
              "$ref": "#/components/schemas/CheckoutCountry"
            company:
              "$ref": "#/components/schemas/CheckoutCompany"
            recurring:
              type: array
              items:
                "$ref": "#/components/schemas/CheckoutCartRecurringItem"
            enrollment_pack:
              "$ref": "#/components/schemas/CheckoutEnrollmentPack"
        meta:
          type: object
          additionalProperties: false
          properties:
            shop_url:
              type: string
            checkout_url:
              type: string
            request_id:
              type: [string, 'null']
            timestamp:
              type: string
              format: date-time
            totals_stale:
              type: boolean
              description: Present (true) on the manual-discount response when cart
                recalculation failed after applying the discount.
    SubscriptionResponse:
      description: Single subscription with associations
      type: object
      required:
      - subscription
      properties:
        subscription:
          type: object
          additionalProperties: false
          description: Subscription rendered by SubscriptionBlueprinter
          properties:
            subscription_discounts:
              type: array
              description: Active first-class discount attachments on this subscription.
                Empty array when none.
              items:
                type: object
                properties:
                  id:
                    type: integer
                  duration:
                    type: string
                    enum:
                    - forever
                    - once
                    - repeating
                  duration_cycles:
                    type:
                    - integer
                    - 'null'
                  applied_cycles:
                    type: integer
                  removed_reason:
                    type:
                    - string
                    - 'null'
                  attached_via:
                    type: string
                  discount:
                    type: object
                    additionalProperties: false
                    properties:
                      id:
                        type: integer
                      code:
                        type: string
                  discount_version:
                    type: object
                    additionalProperties: false
                    properties:
                      id:
                        type: integer
                      version_number:
                        type: integer
                      code:
                        type: string
                      price_discount_type:
                        type: string
                      flat_value:
                        type:
                        - number
                        - 'null'
                      percentage_value:
                        type:
                        - number
                        - 'null'
                      apply_to_volume:
                        type: boolean
                  starts_at:
                    type:
                    - string
                    - 'null'
                    format: date-time
                  removed_at:
                    type:
                    - string
                    - 'null'
                    format: date-time
                  attached_by:
                    type:
                    - object
                    - 'null'
                    properties:
                      kind:
                        type: string
                        enum:
                        - member
                        - droplet_installation
                      # member.id is a UUID (string); droplet_installation.id is
                      # an integer.
                      id:
                        type: [integer, string]
                      label:
                        type:
                        - string
                        - 'null'
            renewal_discount_total:
              type: number
              description: Computed discount applied to the next renewal (includes
                renewal-callback amounts; capped at subscription price).
            # --- identity / status ---
            id:
              type: integer
            subscription_token:
              type: string
            status:
              type: string
            currency:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutSubscriptionCurrency"
            timezone:
              # Blueprinter renders `subscription.timezone || "UTC"`, so this is
              # never null.
              type: string
            address_id:
              type: [integer, 'null']
            order_id:
              type: [integer, 'null']
            notes:
              type: [string, 'null']
            customer_notes:
              type: [array, 'null']
              items:
                "$ref": "#/components/schemas/CheckoutSubscriptionCustomerNote"
            # --- quantities / counts ---
            quantity:
              type: integer
            decline_count:
              type: integer
            attempts:
              type: integer
            skipped_count:
              type: integer
            max_skips:
              type: [integer, 'null']
            # --- flags ---
            digital:
              type: boolean
            disabled:
              type: boolean
            # --- money ---
            # price/original_price are rendered via `.to_f` in the blueprinter,
            # so they are always plain numbers (never string/null).
            price:
              type: number
            original_price:
              type: number
            # cv/qv/cv_total/qv_total read JSONB metadata first, so a string
            # can leak through from client-written metadata; the fallback
            # (default_cv -> variant_country&.cv || 0) is an integer column,
            # covered by the number arm. Never null. The [number, string]
            # union stays forward-compatible with decimal CV/QV (CURRENT-2218).
            cv:
              type: [number, string]
            qv:
              type: [number, string]
            cv_total:
              type: [number, string]
            qv_total:
              type: [number, string]
            # shipping_fee reads a raw JSONB shipping-method price (number or
            # string) and is nil for a discarded variant.
            shipping_fee:
              type: [number, string, 'null']
            shipping_fee_for_display:
              type: [string, 'null']
            # --- timestamps ---
            # created_at/updated_at are NOT NULL columns, so they are always present.
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
            cancelled_at:
              type: [string, 'null']
              format: date-time
            last_bill_date:
              type: [string, 'null']
              format: date-time
            next_bill_date:
              type: [string, 'null']
              format: date-time
            last_ship_date:
              type: [string, 'null']
              format: date-time
            next_ship_date:
              type: [string, 'null']
              format: date-time
            last_failed_at:
              type: [string, 'null']
              format: date-time
            next_retry_at:
              type: [string, 'null']
              format: date-time
            # --- associations ---
            customer:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutSubscriptionCustomer"
            address:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutSubscriptionAddress"
            variant:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutSubscriptionVariant"
            subscription_plan:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutSubscriptionPlanDetail"
            company:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutSubscriptionCompany"
            country:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutSubscriptionCountry"
            volume_rep:
              type: [object, 'null']
              additionalProperties: false
              properties:
                id:
                  type: [integer, 'null']
                email:
                  type: [string, 'null']
                full_name:
                  type: [string, 'null']
                image_url:
                  type: [string, 'null']
                external_id:
                  type: [string, 'null']
            # Rendered only for active subscriptions; null otherwise.
            next_order:
              type: [object, 'null']
              additionalProperties: false
              properties:
                bill_date:
                  type: [string, 'null']
                item_quantity:
                  type: string
                item_price:
                  type: string
            payment_method:
              anyOf:
              - type: 'null'
              - "$ref": "#/components/schemas/CheckoutSubscriptionPaymentMethodDetail"
            orders:
              type: array
              items:
                "$ref": "#/components/schemas/CheckoutSubscriptionOrder"
            bundled_items:
              type: array
              items:
                "$ref": "#/components/schemas/CheckoutSubscriptionBundledItem"
            # Sibling subscriptions rendered by SubscriptionBlueprinter view
            # with_bundled_subscriptions.
            bundled_subscriptions:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: integer
                  subscription_token:
                    type: string
                  price:
                    type: number
                  original_price:
                    type: number
                  subscription_plan_name:
                    # subscription_plans.name is null:false and the blueprinter
                    # dereferences the plan without safe navigation.
                    type: string
                  currency:
                    anyOf:
                    - type: 'null'
                    - "$ref": "#/components/schemas/CheckoutSubscriptionCurrency"
                  variant:
                    anyOf:
                    - type: 'null'
                    - "$ref": "#/components/schemas/CheckoutSubscriptionVariant"
            subscription_skips:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  id:
                    type: integer
                  # subscription_skips.skipped_date is a date column ("YYYY-MM-DD").
                  skipped_date:
                    type: string
                  reason:
                    type: [string, 'null']
                  unskipped_at:
                    type: [string, 'null']
                    format: date-time
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
        meta:
          "$ref": "#/components/schemas/Meta"
    SubscriptionListResponse:
      description: Paginated list of subscriptions
      type: object
      required:
      - subscriptions
      properties:
        subscriptions:
          type: array
          items:
            # Rendered by SubscriptionBlueprinter view :api_index (common +
            # with_variant_association + customer + currency). Lighter than the
            # detail view: no addresses, orders, discounts, next_order, or
            # shipping info.
            type: object
            additionalProperties: false
            properties:
              # --- identity / status ---
              id:
                type: integer
              subscription_token:
                type: string
              status:
                type: string
              timezone:
                # Blueprinter renders `subscription.timezone || "UTC"`.
                type: string
              notes:
                type: [string, 'null']
              # --- quantities / counts ---
              quantity:
                type: integer
              attempts:
                type: integer
              decline_count:
                type: integer
              skipped_count:
                type: integer
              max_skips:
                type: [integer, 'null']
              # --- flags ---
              digital:
                type: boolean
              disabled:
                type: boolean
              # --- money ---
              price:
                type: number
              original_price:
                type: number
              cv:
                type: [number, string]
              qv:
                type: [number, string]
              cv_total:
                type: [number, string]
              qv_total:
                type: [number, string]
              # --- timestamps ---
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
              next_bill_date:
                type: [string, 'null']
                format: date-time
