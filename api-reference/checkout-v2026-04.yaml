    post:
      summary: Retry billing on a past-due subscription
      description: Queues an immediate billing attempt against the payment method
        currently on file. The endpoint is idempotent for a found subscription.
        A rapid duplicate returns queued true while preserving the first retry
        time and does not enqueue another billing attempt.
