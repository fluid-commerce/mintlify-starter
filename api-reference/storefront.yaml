              - string
              - number
              - integer
              - 'null'
            timestamp:
              type:
              - string
              - number
              - integer
              - 'null'
    cat__JsonValue:
      description: Any valid JSON value for provider, integration, theme, metadata, or other dynamic payloads whose keys are
        not fixed by the API contract.
      anyOf:
      - type: string
      - type: number
      - type: boolean
      - type: 'null'
      - type: array
        items:
          $ref: '#/components/schemas/cat__JsonValue'
      - type: object
        additionalProperties:
          $ref: '#/components/schemas/cat__JsonValue'
    cat__ErrorValue:
      description: A validation or API error value.
      anyOf:
      - type: string
      - type: array
        items:
          type: string
      - type: object
        additionalProperties:
          $ref: '#/components/schemas/cat__JsonValue'
