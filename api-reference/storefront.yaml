          - title_asc
          - title_desc
          - updated_at_asc
          - updated_at_desc
          - views_asc
          - views_desc
          - leads_admin_asc
          - leads_admin_desc
          - created_at_asc
          - created_at_desc
          - status_asc
          - status_desc
          default: priority_desc
          description: Sort field and direction (leads_user_{user_id}_asc and leads_user_{user_id}_desc are also supported)
      - name: search_query
        in: query
        required: false
        schema:
          type: string
          description: Search term to filter pages by title or slug
