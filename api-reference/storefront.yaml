  /api/public/v2025-06/enrollment_packs/{slug}:
    post:
      summary: Get enrollment pack by slug
      description: Returns enrollment pack details including enrollable products with bundle group configuration for dynamic
        bundle products.
      operationId: public_v2025_06_enrollment-pack-show
      tags:
      - Enrollments
      parameters:
      - name: slug
        in: path
        description: Enrollment pack slug
        example: example-slug
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  enrollment_pack:
                    type: object
                    properties:
                      enrollment_pack_id:
                        type: integer
                      slug:
                        type: string
                      token:
                        type: string
                      title:
                        type: string
                      description:
                        type:
                        - string
                        - 'null'
                      enrollment_fee:
                        type: string
                      additional_volume:
                        type:
                        - integer
                        - 'null'
                      canonical_url:
                        type: string
                      enrollable_products:
                        type: array
                        description: Products in the enrollment pack with bundle group details for dynamic bundles
                        items:
                          type: object
                          properties:
                            enroll_product_id:
                              type: integer
                            product_id:
                              type: integer
                            variant_id:
                              type: integer
                            type:
                              type: string
                              enum:
                              - membership
                              - subscription
                            subscription_plan_id:
                              type:
                              - integer
                              - 'null'
                            bundle:
                              type: boolean
                              description: Whether this product is a dynamic bundle requiring bundle_selections
                            product_bundle_groups:
                              type: array
                              description: Only present when bundle is true
                              items:
                                type: object
                                properties:
                                  id:
                                    type: integer
                                  title:
                                    type: string
                                  group_type:
                                    type: string
                                    enum:
                                    - included
                                    - customizable
                                  selection_type:
                                    type:
                                    - string
                                    - 'null'
                                    enum:
                                    - exact
                                    - min_only
                                    - max_only
                                    - min_and_max
                                    - null
                                  min_selections:
                                    type:
                                    - integer
                                    - 'null'
                                  max_selections:
                                    type:
                                    - integer
                                    - 'null'
                                  allow_subscriptions:
                                    type: boolean
                                  force_subscriptions:
                                    type: boolean
                                  sort_order:
                                    type: integer
                                  bundle_group_items:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        id:
                                          type: integer
                                        variant_id:
                                          type: integer
                                        quantity:
                                          type: integer
                                        sort_order:
                                          type: integer
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pub__StandardErrorResponse'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pub__EnrollmentPackShowRequestBodyApplicationJsonSchema'
      security: []
