        in: query
        required: false
        schema:
          type: integer
          description: Filter pages by tag ID
      - name: with_category_id
        in: query
        required: false
        schema:
          type: integer
          description: Filter pages by category ID
      - name: country_id
        in: query
        required: false
        schema:
          type: integer
          description: Filter pages by country ID
      - name: by_language
        in: query
        required: false
        schema:
          type: string
          description: Filter pages by language code (e.g., 'en', 'es')
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
          description: Page number for pagination
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          default: 20
          description: Number of items per page
