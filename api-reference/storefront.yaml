openapi: 3.1.0
info:
  title: Fluid Storefront API
  version: v2025-06
  description: Storefront resources — catalog, content, and the publicly readable storefront surface. Every resource shares
    a common shareable model (slug, title, description, media, SEO, metafields, compliance). Authenticated management runs
    on api.fluid.app; visitor-facing reads are unauthenticated and FairShare-attributed.
  contact:
    email: support@fluid.app
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
- url: https://api.fluid.app
tags:
- name: Categories
- name: Collections
- name: Products
- name: Pages
- name: Posts
- name: Enrollments
- name: Media
- name: Playlists
security:
- bearer_auth: []
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
  schemas:
    cat__Meta:
      type: object
      properties:
        request_id:
          type:
          - string
          - 'null'
        timestamp:
          type: string
          format: date-time
    cat__PaginatedMeta:
      type: object
      properties:
        request_id:
          type:
          - string
          - 'null'
        timestamp:
          type: string
          format: date-time
        pagination:
          type: object
          properties:
            current_page:
              type: integer
            total_pages:
              type: integer
            total_count:
              type: integer
            per_page:
              type: integer
    cat__UnauthorizedResponse:
      type: object
      required:
      - message
      properties:
        message:
          type: string
    cat__ErrorResponse:
      type: object
      required:
      - error_message
      - errors
      - meta
      properties:
        error_message:
          type: string
        errors:
          $ref: '#/components/schemas/cat__ErrorBag'
          description: Field-level validation errors keyed by attribute name
        meta:
          $ref: '#/components/schemas/cat__Meta'
    cat__CategorySummary:
      description: Category with key fields (full object includes sub_categories, products, SEO, and template associations)
      type: object
      required:
      - id
      - title
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type:
          - string
          - 'null'
        slug:
          type:
          - string
          - 'null'
        image_url:
          type:
          - string
          - 'null'
        position:
          type:
          - integer
          - 'null'
        active:
          type: boolean
        public:
          type: boolean
        parent_id:
          type:
          - integer
          - 'null'
        has_children:
          type: boolean
    cat__CollectionSummary:
      description: Collection with key fields (full object includes product_collections, SEO, and template associations)
      type: object
      required:
      - id
      - title
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type:
          - string
          - 'null'
        description:
