                        prompts_enabled:
                          type: boolean
                        custom_slug:
                          type: boolean
                        default:
                          type: boolean
                        use_for_enrollment_completion:
                          type: boolean
                        use_search_engine:
                          type: boolean
                        show_on_site_search:
                          type: boolean
