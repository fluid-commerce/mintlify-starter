          - string
          - 'null'
        position:
          type:
          - integer
          - 'null'
        active:
          type: boolean
        public:
          type: boolean
        featured:
          type: boolean
    cat__ProductSummary:
      description: Product with key fields (full object includes variants, options, images, bundles, tags, SEO, metafields,
        subscription plans)
      type: object
      required:
      - id
      properties:
        id:
          type: integer
        title:
          type:
          - string
          - 'null'
        slug:
          type:
          - string
          - 'null'
        sku:
          type:
          - string
          - 'null'
        status:
          type:
          - string
          - 'null'
        active:
          type: boolean
        price:
          type:
          - number
          - string
          - 'null'
        image_url:
          type:
          - string
          - 'null'
        in_stock:
          type: boolean
        bundle:
          type: boolean
    cat__VariantSummary:
      description: Variant with key fields (full object includes inventory_levels, variant_countries, images, metafields,
        country_of_origin)
      type: object
