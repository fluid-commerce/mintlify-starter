    cmp__CompanyMetafieldDefinition:
      title: MetafieldDefinition
      type:
      - object
      - 'null'
      properties:
        id:
          type:
          - integer
          - string
          - number
          - 'null'
        company_id:
          description: The ID of the company that owns this metafield definition.
          type:
          - integer
          - string
          - number
          - 'null'
        namespace:
          description: A container for related metafield definitions. Used to group definitions by app or functionality. Must
            be unique within company and owner_resource.
          type:
          - string
          - number
          - integer
          - 'null'
          maxLength: 20
          pattern: ^[a-zA-Z0-9_]+$
        key:
          description: The unique identifier for the metafield definition within its namespace and owner_resource. Combined
            with namespace and owner_resource, this must be unique per company.
          type:
          - string
          - number
          - integer
          - 'null'
          maxLength: 30
          pattern: ^[a-zA-Z0-9_]+$
        name:
          description: Human-readable display name for the metafield definition, shown in admin interfaces and forms.
          type:
          - string
          - number
          - integer
          - 'null'
          maxLength: 100
        description:
          description: Detailed explanation of what this metafield definition represents, how it should be used, and any special
            instructions for content creators.
          type:
          - string
          - number
          - integer
          - 'null'
        value_type:
          description: The data type that defines how metafield values should be validated, stored, and displayed. Determines
            which validation rules are available.
          type:
          - string
          - number
          - integer
          - 'null'
        validation_rules:
          description: JSON object containing validation constraints that will be applied to metafield values. Available rules
            depend on the value_type.
          type:
          - object
          - 'null'
          additionalProperties:
            $ref: '#/components/schemas/cmp__JsonValue'
        owner_resource:
          description: The type of resource (model class name) that metafields using this definition can be attached to. Must
            match the polymorphic owner_type.
          type:
          - string
          - number
          - integer
          - 'null'
        pinned:
          description: Whether this definition should be prominently displayed or prioritized in admin interfaces and forms.
          type:
          - boolean
          - 'null'
          default: false
        position:
          default: 0
          description: Sort order for displaying this definition relative to others in the same category and owner_resource.
            Lower numbers appear first.
          type:
          - integer
          - string
          - number
          - 'null'
        locked:
          description: Whether this metafield definition is locked, preventing direct updates or deletions of metafields using
            this definition.
          type:
          - boolean
          - 'null'
          default: false
        created_at:
          description: Timestamp when the metafield definition was created.
          type:
          - string
          - number
          - integer
          - 'null'
          format: date-time
        updated_at:
          description: Timestamp when the metafield definition was last updated.
          type:
          - string
          - number
          - integer
          - 'null'
          format: date-time
        list_type:
          description: Whether this definition is for list-type metafields that store arrays of values.
          type:
          - boolean
          - 'null'
        reference_type:
          description: Whether this definition is for reference-type metafields that store references to other resources.
          type:
          - boolean
          - 'null'
        supported_validations:
          description: Array of validation rule names that are supported for this value_type.
          type:
          - array
          - 'null'
          items:
            $ref: '#/components/schemas/cmp__JsonValue'
        validation_description:
          description: Human-readable description of what the value_type represents and its constraints.
          type:
          - string
          - number
          - integer
          - 'null'
        category_ids:
          description: Array of category IDs that this metafield definition is associated with for organizational purposes.
          items:
            type:
            - integer
            - string
            - number
            - 'null'
          type:
          - array
          - 'null'
