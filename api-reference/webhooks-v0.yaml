  "/api/company/webhooks":
    get:
      summary: List webhooks
      description: |
        Lists the company's webhook subscriptions, paginated. Read-only. The optional
        `query` object narrows results by `active`, `resource`, or free-text
        `search_query`, and pages with `page`/`per_page` (max 100). Requires a company
        Bearer token (`401` otherwise).
      tags:
      - webhooks
      operationId: webhooks_v0_index_webhooks
      security:
      - bearer_auth: []
      parameters:
      - name: query
        in: query
        description: |
          Optional filter and pagination object. `page` (1-based) and `per_page`
          (max 100) page the results; `active` filters by enabled state, `resource` by
          subscribed resource, and `search_query` is a free-text match. All fields are
          optional.
        schema:
          type: object
          properties:
            page:
              type: integer
              exclusiveMinimum: 0
            per_page:
              type: integer
              exclusiveMinimum: 0
              maximum: 100
            active:
              type: boolean
            resource:
              type: string
            search_query:
              type: string
          required: []
      responses:
        '200':
          description: Returns paginated webhooks
          content:
            application/json:
              schema:
                type: object
                required:
                - webhooks
                properties:
                  webhooks:
                    type: array
                    items:
                      "$ref": "#/components/schemas/WebhookSummary"
                  meta:
                    "$ref": "#/components/schemas/PaginatedMeta"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
    post:
      summary: Create a webhook
      description: |
        Creates a webhook subscription: Fluid delivers a JSON payload to `url` each time
        the chosen `event` fires on the chosen `resource`. `resource`, `event`, and
        `url` are required; `active`, `http_method`, and `auth_token` (the shared secret
        Fluid signs deliveries with) are optional. Returns `201` with the subscription
        under a `webhook` key — including its integer `id` and the `event_identifier`
        for the event's payload schema — and `422` when the body fails validation.
        Requires a company Bearer token (`401` otherwise). In production `url` must be a
        publicly reachable HTTPS endpoint.
      tags:
      - webhooks
      operationId: webhooks_v0_create_webhook
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '422':
          description: Unprocessable entity
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '201':
          description: Webhook created
          content:
            application/json:
              schema:
                type: object
                required:
                - webhook
                properties:
                  webhook:
                    "$ref": "#/components/schemas/WebhookSummary"
                  meta:
                    "$ref": "#/components/schemas/Meta"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - webhook
              properties:
                webhook:
                  type: object
                  required:
                  - url
                  - resource
                  - event
                  properties:
                    url:
                      type: string
                    resource:
                      type: string
                    event:
                      type: string
                    active:
                      type: boolean
                    http_method:
                      type: string
                    auth_token:
                      type: string
            examples:
              order_created:
                summary: Subscribe to order.created and sign deliveries with a secret
                value:
                  webhook:
                    resource: order
                    event: created
                    url: https://hooks.acme-wellness.com/fluid/orders
                    active: true
                    http_method: post
                    auth_token: k7Jf2Qm9RtV8xZ1aB4cD6eG0hL3nP5s
              minimal:
                summary: Minimal subscription — only the required fields
                value:
                  webhook:
                    resource: cart
                    event: updated
                    url: https://hooks.example.com/fluid/carts
  "/api/company/webhooks/bulk_delete":
    delete:
      summary: Bulk delete webhooks
