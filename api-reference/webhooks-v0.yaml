                    auth_token:
                      type: string
                    http_method:
                      type: string
                      enum:
                      - post
                      - put
                      - get
            examples:
              deactivate:
                summary: Disable a subscription without deleting it
                value:
                  webhook:
                    active: false
              rotate_secret:
                summary: Rotate the signing secret
                value:
                  webhook:
                    auth_token: n2P5sQ8vB1xZ4aD7cF0hK3mR6tW9yE2
              update_endpoint:
                summary: Point the subscription at a new URL and delivery method
                value:
                  webhook:
                    url: https://hooks.acme-wellness.com/fluid/orders-v2
                    http_method: post
    delete:
      summary: Delete a webhook
      description: |
        Deletes a webhook subscription by its numeric `id`; Fluid stops delivering its
        events. Returns `200` echoing the deleted webhook's `id`, or `404` when the id
        is unknown. Requires a company Bearer token (`401` otherwise).
      tags:
      - webhooks
      operationId: webhooks_v0_destroy_webhook
      security:
      - bearer_auth: []
      parameters:
      - name: id
        in: path
        schema:
          type: string
        required: true
        description: |
          Identifier of the webhook subscription — the numeric `id` returned at create,
          carried as a path segment.
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Webhook deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhook:
                    type: object
                    description: The deleted webhook, echoed as an id-only object.
                    properties:
                      id:
                        type: integer
                  meta:
                    "$ref": "#/components/schemas/Meta"
  "/api/webhooks/schemas":
    get:
      summary: List webhook schemas
      description: |
        Lists the published JSON payload schemas for webhook events — use them to
        generate types or validate deliveries. Read-only. The optional `event_identifier`
        query parameter narrows the list to a single event's schema. Requires a company
        Bearer token (`401` otherwise).
      tags:
      - webhook-schemas
      security:
      - bearer_auth: []
      parameters:
      - name: event_identifier
        in: query
        required: false
        description: Filter schemas by event identifier
        schema:
          type: string
      responses:
        '200':
          description: Returns available webhook schemas
          content:
            application/json:
              schema:
                type: object
                required:
                - schemas
                properties:
                  schemas:
                    type: array
                    items:
                      "$ref": "#/components/schemas/WebhookSchemaSummary"
                  meta:
                    "$ref": "#/components/schemas/Meta"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
      operationId: webhooks_v0_get_api_webhooks_schemas
  "/api/webhooks/schemas/{event_identifier}":
    get:
      summary: Show a webhook schema
      description: Returns the latest schema for a specific event identifier.
      tags:
      - webhook-schemas
      security:
      - bearer_auth: []
      parameters:
      - name: event_identifier
        in: path
        required: true
        description: The event identifier to get the schema for
        schema:
          type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '404':
          description: Event identifier not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '200':
          description: Schema found
          content:
            application/json:
              schema:
                type: object
                required:
                - schema
                properties:
                  schema:
                    "$ref": "#/components/schemas/WebhookSchemaSummary"
                  meta:
                    "$ref": "#/components/schemas/Meta"
      operationId: webhooks_v0_get_api_webhooks_schemas_by_event_identifier
  "/api/company/webhooks/resources/{resource_name}":
    get:
      operationId: webhooks_v0_webhook_resource_events
      summary: Get webhook events for a resource
      description: |
        Returns the most recent delivered event for `resource_name` as the same envelope
        Fluid POSTs to your endpoint (the event `id`, `identifier`, `name`, `timestamp`,
        and the enriched `payload`) — use it to confirm what Fluid last sent. Read-only.
        Pass a resource the company has actually registered; an unknown or unregistered
        `resource_name` returns `404` with a `{message, status}` body. Requires a company
        Bearer token (`401` otherwise).
      tags:
      - webhooks
      security:
      - bearer_auth: []
      parameters:
      - name: resource_name
        in: path
        required: true
        description: |
          The resource whose most recent delivered event to return, e.g. `order`,
          `cart`, or `member`. Must be a resource the company has registered; an unknown
          or unregistered value returns `404`.
        schema:
          type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '404':
          description: >-
            The resource name is not registered — a JSON body of
            `{message, status}`.
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/StandardErrorResponse"
        '200':
          description: Resource events listed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/WebhookResourceEventEnvelope"
