        '422':
          description: One or more country ISO codes were not recognized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/StandardErrorResponse"
        '200':
          description: Notifications sent
          content:
            application/json:
              schema:
                type: string
      security:
      - bearer_auth: []
