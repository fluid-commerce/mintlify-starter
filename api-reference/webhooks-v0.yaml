  "/api/company/events/{eventId}/send_notifications":
    get:
      tags:
      - company-events
      summary: Send event notifications
      description: Sends notifications about an event to concerned parties based on
        specified countries.
      operationId: webhooks_v0_send_event_notifications
      parameters:
      - name: eventId
        in: path
        required: true
        schema:
          type: integer
        description: The unique identifier of the event to send notifications for
      - name: event[available_countries][]
        in: query
        required: false
        description: ISO country codes to scope the notification to, read from
          `params[:event][:available_countries]`. Omit to notify all countries;
          any unrecognized ISO returns 422.
        schema:
          type: array
          items:
            type: string
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '404':
          description: Not found
          content:
