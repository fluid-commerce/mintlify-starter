  "/api/company/events":
    post:
      tags:
      - company-events
      summary: Create company event
      description: Add a new event for the company with details like title, dates,
        venue, and optional media content.
      operationId: webhooks_v0_create_company_event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - event
              description: Event attributes are nested under a required `event`
                key; omitting it returns 400.
              properties:
                event:
                  type: object
                  description: Event attributes accepted by the controller. title,
                    description, start, end, and time_zone are required by the Event
                    model, so an event missing any of them returns 422.
                  properties:
                    title:
                      type: string
                    description:
                      type: string
                    venue:
                      type: string
                    url:
                      type: string
                    user_id:
                      type: integer
                    company_id:
                      type: integer
                    start_date:
                      type: string
                      description: Event start date, e.g. "2026-04-01".
                    end_date:
                      type: string
                      description: Event end date, e.g. "2026-04-02".
                    start_time:
                      type: string
                      description: Event start time, e.g. "09:00".
                    end_time:
                      type: string
                      description: Event end time, e.g. "17:00".
                    active:
                      type: boolean
                    time_zone:
                      type: string
                      description: IANA time zone name, e.g. "UTC".
                    send_notification:
                      type: boolean
                    available_countries:
                      type: array
                      description: ISO country codes the event is scoped to.
                      items:
                        type: string
                    country_ids:
                      type: array
                      items:
                        type: integer
                    images_attributes:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          image_url:
                            type: string
                          position:
                            type: integer
                          _destroy:
                            type: boolean
      responses:
        '400':
          description: Missing required parameters (no `event` key)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/StandardErrorResponse"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '422':
          description: Validation failed (missing or invalid event attributes)
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/StandardErrorResponse"
        '200':
          description: Event created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/WebhookCompanyEvent"
      security:
      - bearer_auth: []
    get:
      tags:
      - company-events
      summary: List company events
      description: Retrieves a list of events associated with the company.
      operationId: webhooks_v0_list_company_events
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '200':
          description: Events listed
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties:
                    "$ref": "#/components/schemas/JsonValue"
      security:
      - bearer_auth: []
