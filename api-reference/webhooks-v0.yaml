---
openapi: 3.1.0
info:
  title: Fluid Webhooks API
  description: Webhook subscriptions, callback registrations, webhook/callback schemas,
    and company events.
  version: v0
  contact:
    email: support@fluid.app
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
- url: https://api.fluid.app
- url: https://{company}.fluid.app
  description: Production server with company subdomain
  variables:
    company:
      default: myco
      description: Company subdomain
tags:
- name: webhooks
  description: Webhook subscriptions — create, list, update, delete, and inspect the
    most recent delivered event per resource.
- name: webhooks-resources
  description: The catalog of resources (and their events) a webhook may subscribe
    to.
- name: webhook-schemas
  description: Published JSON payload schemas for webhook events, keyed by event identifier.
- name: callback-registrations
  description: Synchronous callback registrations that let a company or droplet
    respond to Fluid callbacks (e.g. tax, shipping).
- name: callback-definitions
  description: The catalog of callback definitions a registration can target.
- name: callback-schemas
  description: Request/response schemas for each callback definition.
- name: company-events
  description: Company calendar events surfaced to members, with optional country-scoped
    notifications.
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      description: Bearer token authentication
  schemas:
    Meta:
      type: object
      properties:
        request_id:
          type:
          - string
          - 'null'
        timestamp:
          type: string
          format: date-time
    PaginatedMeta:
      type: object
      properties:
        request_id:
          type:
          - string
          - 'null'
        timestamp:
          type: string
          format: date-time
        pagination:
          type: object
          properties:
            current_page:
              type: integer
            total_pages:
              type: integer
            total_count:
              type: integer
            per_page:
              type: integer
    ErrorResponse:
      type: object
      required:
      - error_message
      - errors
      - meta
      properties:
        error_message:
          type: string
        errors:
          "$ref": "#/components/schemas/ErrorBag"
        meta:
          "$ref": "#/components/schemas/Meta"
    UnauthorizedResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    WebhookSummary:
      description: Webhook subscription
      type: object
      properties:
        id:
          type: integer
          description: |
            Numeric identifier of the webhook subscription, assigned at create. Used to
            address the subscription on the `/api/company/webhooks/{id}` endpoints.
        company_id:
          type: integer
          description: Id of the company that owns the subscription.
        droplet_installation_uuid:
          description: UUID of the droplet installation that owns the webhook, or
            null when the webhook is company-owned.
          type:
          - string
          - 'null'
        url:
          type: string
          description: |
            HTTPS endpoint Fluid delivers matching events to. In production it must be
            publicly reachable — Fluid does not deliver to internal or private hosts.
        active:
          type: boolean
          description: |
            Whether the subscription is enabled. When `false`, Fluid keeps the
            subscription but delivers nothing.
        resource:
          type:
          - string
          - 'null'
          description: |
            The resource being watched (e.g. `order`, `cart`, `member`); set when the
            subscription is created. May be `null` in the response for a subscription
            without one.
        event:
          type:
          - string
          - 'null'
          description: |
            The event on the resource that triggers delivery (e.g. `created`); set at
            create alongside `resource`. May be `null` in the response for a subscription
            without one.
        event_identifier:
          type:
          - string
          - 'null'
          description: |
            Identifier Fluid uses for this event's payload schema (e.g. `order_created`).
            Look up the schema under `/api/webhooks/schemas`.
        http_method:
          type: string
          enum:
          - post
          - put
          - get
          description: HTTP method Fluid uses to deliver the payload to `url`.
        auth_token:
          type:
          - string
          - 'null'
          description: |
            Shared secret Fluid signs each delivery with; `null` when none is set.
            Rotate it by sending a new value to the update endpoint.
        created_at:
          type: string
          format: date-time
          description: Timestamp when the subscription was created (ISO 8601).
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the subscription was last updated (ISO 8601).
    CallbackRegistrationSummary:
      description: Callback registration
      type: object
      properties:
        uuid:
          type: string
          description: |
            Immutable identifier of the registration, assigned at create. Used to
            address it on the `/api/callback/registrations/{uuid}` endpoints.
        company_id:
          type: integer
          description: Id of the company that owns the registration.
        company_name:
          type:
          - string
          - 'null'
          description: Display name of the owning company, or `null`.
        definition_name:
          type: string
          description: |
            The callback definition this registration targets (e.g. a tax or shipping
            callback). Fixed at create.
        url:
          type: string
          description: Endpoint Fluid calls synchronously for this callback.
        verification_token:
          type:
          - string
          - 'null'
          description: |
            Token used to verify that a call to `url` originated from Fluid, or `null`
            when none is set.
        active:
          type: boolean
          description: Whether the registration is enabled.
        country_codes:
          type: array
          description: |
            ISO country codes the callback applies to; empty when it applies to all
            countries.
          items:
            type: string
        created_at:
          type: string
          format: date-time
          description: Timestamp when the registration was created (ISO 8601).
        owner_type:
          type:
          - string
          - 'null'
          description: |
            Type of the record that owns the registration (e.g. a company or droplet
            installation), or `null`.
        owner_id:
          type:
          - integer
          - 'null'
          description: Id of the owning record, or `null`.
        owner_name:
          type:
          - string
          - 'null'
          description: Display name of the owner, or `null`.
    CallbackDefinitionSummary:
      description: Callback definition
      type: object
      properties:
        name:
          type: string
          description: |
            Unique name of the callback definition; the value a registration sets as
            `definition_name`.
        description:
          type:
          - string
          - 'null'
          description: Human-readable summary of what the callback is for, or `null`.
        example_response:
          description: |
            Example response body Fluid expects your endpoint to return, or `null`.
          anyOf:
          - type: object
            additionalProperties:
              "$ref": "#/components/schemas/JsonValue"
          - type: 'null'
        request_schema:
          description: |
            JSON Schema of the request Fluid sends to your endpoint, or `null`.
          anyOf:
          - type: object
            additionalProperties:
              "$ref": "#/components/schemas/JsonValue"
          - type: 'null'
        response_schema:
          description: |
            JSON Schema of the response Fluid expects back from your endpoint, or `null`.
          anyOf:
          - type: object
            additionalProperties:
              "$ref": "#/components/schemas/JsonValue"
          - type: 'null'
    CallbackSchemaSummary:
      description: Callback schema
      type: object
      properties:
        name:
          type: string
          description: Name of the callback definition this schema describes.
        version:
          type:
          - string
          - 'null'
          description: Schema version, or `null` when unversioned.
        schema_hash:
          type:
          - string
          - 'null'
          description: Hash of this schema version, or `null`.
        description:
          type:
          - string
          - 'null'
          description: Human-readable summary of the callback, or `null`.
        request_schema:
          description: JSON Schema of the request Fluid sends, or `null`.
          anyOf:
          - type: object
            additionalProperties:
              "$ref": "#/components/schemas/JsonValue"
          - type: 'null'
        response_schema:
          description: JSON Schema of the response Fluid expects, or `null`.
          anyOf:
          - type: object
            additionalProperties:
              "$ref": "#/components/schemas/JsonValue"
          - type: 'null'
    WebhookSchemaSummary:
      description: Webhook payload schema
      type: object
      properties:
        id:
          type: integer
          description: Numeric identifier of the stored schema record.
        event_identifier:
          type: string
          description: |
            The event this schema describes (e.g. `order_created`) — the key used to
            fetch it at `/api/webhooks/schemas/{event_identifier}`.
        version:
          type:
          - string
          - 'null'
          description: Schema version, or `null` when unversioned.
        schema_hash:
          type:
          - string
          - 'null'
          description: |
            Hash of this schema version, or `null`; changes when the schema changes.
        schema_definition:
          description: |
            The JSON Schema for the event's payload, or `null` when unavailable. Use it
            to generate types or validate deliveries.
          anyOf:
          - type: object
            additionalProperties:
              "$ref": "#/components/schemas/JsonValue"
          - type: 'null'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the schema record was created (ISO 8601).
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the schema record was last updated (ISO 8601).
    JsonValue:
      description: Any valid JSON value for provider, integration, theme, metadata,
        or other dynamic payloads whose keys are not fixed by the API contract.
      anyOf:
      - type: string
      - type: number
      - type: boolean
      - type: 'null'
      - type: array
        items:
          "$ref": "#/components/schemas/JsonValue"
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/JsonValue"
    ErrorValue:
      description: A validation or API error value.
      anyOf:
      - type: string
      - type: array
        items:
          type: string
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/JsonValue"
    ErrorBag:
      description: Validation errors keyed by field, a list of errors, a single error
        message, or null when no structured error details are available.
      anyOf:
      - type: string
      - type: array
        items:
          "$ref": "#/components/schemas/ErrorValue"
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/ErrorValue"
      - type: 'null'
    ErrorMessage:
      description: An API error message represented as text or structured JSON.
      anyOf:
      - type: string
      - "$ref": "#/components/schemas/ErrorBag"
      - type: 'null'
    StandardErrorResponse:
      description: Common legacy error response envelope. Older endpoints may return
        one or more of these fields depending on the controller path.
      type: object
      properties:
        message:
          type: string
        error:
          "$ref": "#/components/schemas/ErrorMessage"
        error_message:
          "$ref": "#/components/schemas/ErrorMessage"
        errors:
          "$ref": "#/components/schemas/ErrorBag"
        meta:
          "$ref": "#/components/schemas/Meta"
      additionalProperties:
        "$ref": "#/components/schemas/JsonValue"
    WebhookResourcesResponse:
      type:
      - object
      - 'null'
      properties:
        resources:
          type:
          - object
          - 'null'
          description: |
            Map of subscribable resource names to the events available on each. Read it
            before creating a subscription to discover valid `resource`/`event` pairs.
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
        deprecated_resources:
          type: array
          description: Resource topics that are deprecated and will be removed;
            migrate to the member_* topics.
          items:
            type: string
        meta:
          type:
          - object
          - 'null'
          properties:
            request_id:
              type:
              - string
              - number
              - integer
              - 'null'
            timestamp:
              type:
              - string
              - number
              - integer
              - 'null'
    WebhookCompanyEvent:
      type: object
      properties:
        active:
          type: boolean
        canonical_time_zone:
          type: string
        color:
          type: string
        countries:
          type: array
          items:
            "$ref": "#/components/schemas/JsonValue"
        description:
          type: object
          properties:
            body:
              type: string
            created_at:
              type: string
              format: date-time
            id:
              type: integer
            locale:
              type: 'null'
            name:
              type: string
            record_id:
              type: integer
            record_type:
              type: string
            updated_at:
              type: string
              format: date-time
          required:
          - body
          - created_at
          - id
          - locale
          - name
          - record_id
          - record_type
          - updated_at
          additionalProperties: false
        end:
          type: string
          format: date-time
        id:
          type: integer
        image_url:
          type: 'null'
        images:
          type: array
          items:
            "$ref": "#/components/schemas/JsonValue"
        is_all_day:
          type: boolean
        notification_sent_at:
          type: 'null'
        send_notification:
          type: boolean
        start:
          type: string
          format: date-time
        status:
          type: 'null'
        time_zone:
          type: string
        title:
          type: string
        url:
          type: 'null'
        user_id:
          type: 'null'
        venue:
          type: 'null'
      required:
      - active
      - canonical_time_zone
      - color
      - countries
      - description
      - end
      - id
      - image_url
      - images
      - is_all_day
      - notification_sent_at
      - send_notification
      - start
      - status
      - time_zone
      - title
      - url
      - user_id
      - venue
      additionalProperties: false
    WebhookCompanyEventDeleteResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
      additionalProperties: false
    WebhookCompanyEventDetailResponse:
      type: object
      properties:
        active:
          type:
          - boolean
          - 'null'
        canonical_time_zone:
          type:
          - string
          - 'null'
        color:
          type:
          - string
          - 'null'
        countries:
          type:
          - array
          - 'null'
          items:
            "$ref": "#/components/schemas/JsonValue"
        description:
          type: 'null'
        end:
          type:
          - string
          - 'null'
          format: date-time
        events:
          type:
          - array
          - 'null'
          items:
            type: object
            properties:
              active:
                type: boolean
              canonical_time_zone:
                type: string
              color:
                type: string
              countries:
                type: array
                items:
                  "$ref": "#/components/schemas/JsonValue"
              description:
                type: 'null'
              end:
                type: string
                format: date-time
              id:
                type: integer
              image_url:
                type: 'null'
              images:
                type: array
                items:
                  "$ref": "#/components/schemas/JsonValue"
              is_all_day:
                type: boolean
              notification_sent_at:
                type: 'null'
              send_notification:
                type: boolean
              start:
                type: string
                format: date-time
              status:
                type: 'null'
              time_zone:
                type: string
              title:
                type: string
              url:
                type: string
              user_id:
                type: integer
              venue:
                type: 'null'
            required:
            - active
            - canonical_time_zone
            - color
            - countries
            - description
            - end
            - id
            - image_url
            - images
            - is_all_day
            - notification_sent_at
            - send_notification
            - start
            - status
            - time_zone
            - title
            - url
            - user_id
            - venue
            additionalProperties: false
        id:
          type:
          - integer
          - 'null'
        image_url:
          type: 'null'
        images:
          type:
          - array
          - 'null'
          items:
            "$ref": "#/components/schemas/JsonValue"
        is_all_day:
          type:
          - boolean
          - 'null'
        meta:
          type:
          - object
          - 'null'
          properties:
            pagination:
              type: object
              properties:
                current_page:
                  type: integer
                per_page:
                  type: integer
                total_count:
                  type: integer
                total_pages:
                  type: integer
              required:
              - current_page
              - per_page
              - total_count
              - total_pages
              additionalProperties: false
            request_id:
              type: string
            timestamp:
              type: string
              format: date-time
          required:
          - pagination
          - request_id
          - timestamp
          additionalProperties: false
        notification_sent_at:
          type: 'null'
        send_notification:
          type:
          - boolean
          - 'null'
        start:
          type:
          - string
          - 'null'
          format: date-time
        status:
          type: 'null'
        time_zone:
          type:
          - string
          - 'null'
        title:
          type:
          - string
          - 'null'
        url:
          type:
          - string
          - 'null'
        user_id:
          type:
          - integer
          - 'null'
        venue:
          type: 'null'
      additionalProperties: false
    WebhookResourceEventEnvelope:
      description: >-
        The full event envelope returned by the resource events endpoint. The
        enriched inner payload is nested under `payload` (never a generic
        `data` key), alongside the event id, a generated identifier token, the
        event name, and a timestamp.
      type: object
      required:
      - id
      - identifier
      - name
      - payload
      - timestamp
      properties:
        id:
          type: integer
          description: Numeric identifier of the stored event.
        identifier:
          type: string
          description: >-
            The event's generated identifier token, not the company or event
            name.
        name:
          type: string
          description: Event identifier, e.g. "member_sponsorships_reassigned".
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 event timestamp.
        payload:
          "$ref": "#/components/schemas/WebhookResourceEventPayload"
    WebhookResourceEventPayload:
      description: >-
        The enriched inner payload: the resource data merged with the seven
        metadata fields (event_name, schema_version, schema_hash, company_id,
        resource_name, resource, event). Each resource keys its data under its
        own name — a member payload carries `member`, a cart payload carries
        `cart`, an order payload carries `order`, and so on — never a generic
        `data` key. The oneOf documents the member and cart branches explicitly
        and covers every other resource with an open fallback branch.
      type: object
      additionalProperties: true
      properties:
        event_name:
          type: string
          description: |
            The event's identifier, e.g. `order_created` — matches the envelope's `name`.
        schema_version:
          type: string
          description: Version of the payload schema this delivery conforms to.
        schema_hash:
          type: string
          description: |
            Hash of the payload schema version; use it to detect when a generated type
            is stale.
        company_id:
          type: integer
          description: Id of the company the event belongs to.
        resource_name:
          type: string
          description: |
            Internal type identifier for the resource, which may be namespaced. Do not
            use it to index the payload — read the resource data from the key named for
            the resource in lowercase (`order`, `cart`, `member`).
        resource:
          type: string
          description: |
            The resource the event is about (e.g. `order`), matching the subscription's
            `resource`.
        event:
          type: string
          description: |
            The event that fired (e.g. `created`), matching the subscription's `event`.
      oneOf:
      - "$ref": "#/components/schemas/WebhookMemberResourceData"
      - "$ref": "#/components/schemas/WebhookCartResourceData"
      - "$ref": "#/components/schemas/WebhookGenericResourceData"
    WebhookMemberResourceData:
      description: >-
        Member branch of the enriched payload: the member object is keyed under
        a `member` key. The inner member object is open
        (additionalProperties: true); only a representative subset is
        documented. The required `member` key makes this branch mutually
        exclusive with the cart branch under oneOf (a cart payload has no
        `member`, so it fails this branch).
      type: object
      additionalProperties: true
      required:
      - member
      properties:
        member:
          type: object
          additionalProperties: true
          required:
          - id
          properties:
            id:
              type: string
              description: Member UUID.
            email:
              type: string
            name:
              type: string
            member_type:
              type: object
              additionalProperties: true
              properties:
                id:
                  type: string
                name:
                  type: string
                slug:
                  type: string
    WebhookCartResourceData:
      description: >-
        Cart branch of the enriched payload: the cart object is keyed under a
        `cart` key. The inner cart object is open (additionalProperties: true);
        its fields are not fixed by this contract and only a representative
        subset is documented. The required `cart` key makes this branch
        mutually exclusive with the member branch under oneOf (a member payload
        has no `cart`, so it fails this branch).
      type: object
      additionalProperties: true
      required:
      - cart
      properties:
        cart:
          description: The cart resource payload.
          type: object
          additionalProperties: true
    WebhookGenericResourceData:
      description: >-
        Fallback branch for the resources whose payload keys under their own
        resource name — order, product, subscription, discount, form, and the
        rest of the available topics — rather than `member` or `cart`. It is
        an open object carrying that resource data plus the seven metadata
        fields. Mutually exclusive with the member and cart branches under
        oneOf: the `not` clause makes it match only payloads that carry neither
        `member` nor `cart`, so exactly one branch validates.
      type: object
      additionalProperties: true
      not:
        anyOf:
        - required:
          - member
        - required:
          - cart
paths:
  "/api/callback/definitions":
    get:
      summary: List callback definitions
      description: |
        Lists the callback definitions available to the company — the catalog of
        synchronous callbacks (e.g. tax, shipping) that a registration can target.
        Read-only. Requires a company Bearer token; returns `401` when the token is
        missing or invalid.
      tags:
      - callback-definitions
      security:
      - bearer_auth: []
      responses:
        '200':
          description: Returns available callback definitions
          content:
            application/json:
              schema:
                type: object
                required:
                - definitions
                properties:
                  definitions:
                    type: array
                    items:
                      "$ref": "#/components/schemas/CallbackDefinitionSummary"
                  meta:
                    "$ref": "#/components/schemas/Meta"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
      operationId: webhooks_v0_get_api_callback_definitions
  "/api/callback/registrations":
    get:
      summary: List callback registrations
      description: |
        Lists the company's callback registrations, paginated. Read-only. Accepts an
        optional `filters` object (`page`/`per_page`, plus `company_id`,
        `definition_name`, `sorted_by`, and `active`). Requires a company Bearer token
        (`401` otherwise).
      tags:
      - callback-registrations
      operationId: webhooks_v0_index_callback_registrations
      security:
      - bearer_auth: []
      parameters:
      - name: filters
        in: query
        description: |
          Optional filter and pagination object. `page` (1-based) and `per_page`
          (max 100) page the results; `company_id`, `definition_name`, and `active`
          filter the set, and `sorted_by` chooses the sort. All fields are optional.
        schema:
          type: object
          properties:
            page:
              type: integer
              exclusiveMinimum: 0
            per_page:
              type: integer
              exclusiveMinimum: 0
              maximum: 100
            company_id:
              type: integer
              not:
                type: 'null'
            definition_name:
              type: string
              minLength: 1
            sorted_by:
              type: string
              minLength: 1
            active:
              type: boolean
              not:
                type: 'null'
          required: []
      responses:
        '200':
          description: Returns paginated callback registrations
          content:
            application/json:
              schema:
                type: object
                required:
                - callback_registrations
                properties:
                  callback_registrations:
                    type: array
                    items:
                      "$ref": "#/components/schemas/CallbackRegistrationSummary"
                  meta:
                    "$ref": "#/components/schemas/PaginatedMeta"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
    post:
      summary: Create a callback registration
      description: |
        Registers a synchronous callback for the company against a callback definition,
        so Fluid can call the given `url` for decisions such as tax or shipping.
        `definition_name` and `url` are required. Returns `201` with the created
        registration; `422` when the body fails validation; `409` when a registration
        for this definition already exists for the owner. Requires a company Bearer
        token (`401` otherwise).
      tags:
      - callback-registrations
      operationId: webhooks_v0_create_callback_registration
      security:
      - bearer_auth: []
      responses:
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/UnauthorizedResponse"
        '409':
