            application/json:
              schema:
                type: object
                required:
                - webhooks
                properties:
                  webhooks:
                    type: object
                    properties:
                      webhook_ids:
                        type: array
                        items:
                          type: integer
                      count:
                        type: integer
                  meta:
                    "$ref": "#/components/schemas/Meta"
      requestBody:
