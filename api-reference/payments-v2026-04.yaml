---
openapi: 3.1.0
info:
  title: Fluid Cart Payments API
  version: v2026-04
  description: Consumer-agnostic, cart-scoped payment endpoints under
    /api/payments/v2026-04/carts/{cart_token}. The same endpoints serve checkout,
    admin, and portal identically. Authentication is cart-token based (the token
    in the path); no JWT or API key is required. This spec is the source of truth
    for generated payment API clients and is intentionally separate from
    payment-v2026-04.yaml, which documents the bearer-authenticated
    gateway/transaction admin surface at /api/payment/v2026-04.
  contact:
    email: support@fluid.app
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
- url: https://api.fluid.app
tags:
- name: payments
  description: Cart-scoped payment method selection, VGS card tokenization, and
    3D Secure verification.
- name: paypal
  description: PayPal checkout — client SDK token, order creation and
    authorization, and shipping-change callbacks.
- name: braintree
  description: Braintree checkout — client token issuance and transaction
    authorization.
- name: klarna
  description: Klarna checkout — payment session creation and updates.
- name: apple-pay
  description: Apple Pay checkout — merchant session validation.
components:
  schemas:
    Meta:
      description: Standard response metadata included on every response.
      type: object
      additionalProperties: false
      required:
      - request_id
      - timestamp
      properties:
        request_id:
          type:
          - string
          - 'null'
          description: Server-assigned id for this request, echoed so responses can
            be correlated with server logs and support tickets; `null` when none was
            assigned.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp (UTC) marking when the response was
            generated.
    JsonValue:
      description: Any valid JSON value for provider-specific payloads (card
        payloads, payment method payloads, Apple Pay token envelopes) whose keys
        are not fixed by the API contract.
      anyOf:
      - type: string
      - type: number
      - type: boolean
      - type: 'null'
      - type: array
        items:
          "$ref": "#/components/schemas/JsonValue"
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/JsonValue"
    ErrorValue:
      description: A validation or API error value.
      anyOf:
      - type: string
      - type: array
        items:
          type: string
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/JsonValue"
    ErrorBag:
      description: Validation errors keyed by field, a list of errors, a single
        error message, or null when no structured error details are available.
      anyOf:
      - type: string
      - type: array
        items:
          "$ref": "#/components/schemas/ErrorValue"
      - type: object
        additionalProperties:
          "$ref": "#/components/schemas/ErrorValue"
      - type: 'null'
    ErrorResponse:
      description: Standard error envelope — a human-readable error_message, a
        structured errors object, and response meta.
      type: object
      additionalProperties: false
      required:
      - error_message
      - errors
      - meta
      properties:
        error_message:
          type: string
          description: Human-readable summary of the failure, safe to surface to the
            buyer.
        errors:
          "$ref": "#/components/schemas/ErrorBag"
        meta:
          "$ref": "#/components/schemas/Meta"
    BareErrorResponse:
      description: Legacy error body returned by certain payment-method creation
        error paths. Carries errors (array or object) and sometimes error_message,
        but no meta.
      type: object
      additionalProperties: false
      required:
      - errors
      properties:
        errors:
          "$ref": "#/components/schemas/ErrorBag"
        error_message:
          type: string
          description: Optional human-readable failure summary; some legacy
            payment-method error paths omit it.
    ProcessedCartMeta:
      description: Meta for the processed-cart guard. Carries the shop URL and the
        full processed cart. The cart is returned as an open object here; its
        fully-typed shape is documented in the checkout API.
      type: object
      additionalProperties: false
      required:
      - request_id
      - timestamp
      - shop_url
      - cart
      properties:
        request_id:
          type:
          - string
          - 'null'
          description: Server-assigned id for this request, echoed for log
            correlation; `null` when none was assigned.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp (UTC) marking when the response was
            generated.
        shop_url:
          type:
          - string
          - 'null'
          description: Storefront URL of the shop that owns the processed cart;
            `null` when it cannot be resolved.
        cart:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: The full processed cart as an open object. Its fully-typed
            shape is documented on the Cart checkout surface (Checkout endpoints
            reference).
    ProcessedCartResponse:
      description: Returned with 410 Gone by every cart payment endpoint when the
        cart has already been processed (converted to an order).
      type: object
      additionalProperties: false
      required:
      - error_message
      - errors
      - meta
      properties:
        error_message:
          type: string
          description: Human-readable message stating the cart has already been
            processed into an order.
        errors:
          "$ref": "#/components/schemas/ErrorBag"
        meta:
          "$ref": "#/components/schemas/ProcessedCartMeta"
    SetPaymentMethodResponse:
      description: 'Success body for setting the cart payment method. The shape
        varies by payment type: credit_card/apple_pay return card; saved payment
        methods return card + payment_method; paypal returns order_id (Braintree
        SDK PayPal also returns transaction_id); klarna returns
        authorization_token; bread/affirm/platform payments return an empty
        object.'
      type: object
      additionalProperties: false
      properties:
        order_id:
          type: string
          description: PayPal order id (paypal and decrypted Apple Pay-on-PayPal
            flows).
        transaction_id:
          type: string
          description: Braintree transaction id (Braintree SDK PayPal flow).
        authorization_token:
          type: string
          description: Klarna authorization token (klarna flow).
        card:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: Sanitized stored-card JSON (credit_card, apple_pay, and
            saved payment method flows).
        payment_method:
          type: object
          additionalProperties:
            "$ref": "#/components/schemas/JsonValue"
          description: Formatted payment method (saved payment method flow).
    VgsVault:
      description: VGS Collect vault credentials used to tokenize card data
        client-side.
      type: object
      additionalProperties: false
      required:
      - vault_id
      - environment
      - route_id
      - mode
      - requires_3ds
      properties:
        vault_id:
          type:
          - string
          - 'null'
          description: VGS Collect vault (tenant) id the browser initializes VGS
            Collect with; `null` when no vault is configured for the resolved
            payment account.
        environment:
          type:
          - string
          - 'null'
          description: VGS environment for the vault (e.g. `sandbox`, `live`);
            `null` when unset.
        route_id:
          type:
          - string
          - 'null'
          description: VGS route id that governs how the tokenized card is forwarded
            to the gateway; `null` when unset.
        mode:
          type: string
          description: VGS Collect operating mode for this tokenization attempt.
        requires_3ds:
          type: boolean
          description: '`true` when the resolved payment account requires 3D Secure;
            the client must then run the `verify` step before the card can be
            authorized.'
    TokenizeResponse:
      description: Success body for VGS vault provisioning.
      type: object
      additionalProperties: false
      required:
      - vault
      - requires_3ds
      - payment_account_id
      - meta
      properties:
        vault:
          "$ref": "#/components/schemas/VgsVault"
        requires_3ds:
          type: boolean
          description: '`true` when 3D Secure is required for this card; mirrors
            `vault.requires_3ds`. When `true`, call `verify` before authorizing.'
        payment_account_id:
          type: integer
          description: Id of the CreditCard payment account resolved and pinned to
            the cart for this tokenization; routing is fixed to this account for the
            rest of the flow.
        meta:
          "$ref": "#/components/schemas/Meta"
    VerifyResponse:
      description: Success body for 3D Secure initialization.
      type: object
      additionalProperties: false
      required:
      - tds_method_content
      - merchant_tx_id
      - fingerprinting_required
      - meta
      properties:
        tds_method_content:
          type:
          - string
          - 'null'
          description: HTML content for the 3DS method (device fingerprinting)
            iframe.
        merchant_tx_id:
          type: string
          description: Merchant transaction id (UUID) issued for this 3DS attempt.
        fingerprinting_required:
          type:
          - boolean
          - 'null'
          description: '`true` when the issuer requires the device-fingerprinting
            (3DS method) step to run in an iframe using `tds_method_content` before
            the challenge; `null` when not determined.'
        meta:
          "$ref": "#/components/schemas/Meta"
    PaypalClientSdkTokenResponse:
      description: Success body for the PayPal client SDK token.
      type: object
      additionalProperties: false
      required:
      - client_sdk
      - meta
      properties:
        client_sdk:
          type: object
          additionalProperties: false
          required:
          - token
          description: PayPal client SDK credentials envelope.
          properties:
            token:
              type: string
              description: Client SDK token used to initialize the PayPal JS SDK in
                the browser for this cart.
        meta:
          "$ref": "#/components/schemas/Meta"
    PaypalCreateOrderResponse:
      description: Success body for PayPal order creation. authorization_id and
        payment_uuid are present only for Fastlane orders (when payment_token_id
        is supplied).
      type: object
      additionalProperties: false
      required:
      - success
      - order_id
      - meta
      properties:
        success:
          type: boolean
          description: '`true` when the PayPal order was created.'
        order_id:
          type: string
          description: PayPal order id; pass it to the client SDK to approve, then
            to the authorize endpoint.
        authorization_id:
          type: string
          description: PayPal capture id (Fastlane orders only).
        payment_uuid:
          type: string
          description: Fluid payment reference (slug), returned for Fastlane orders
            only. This is the reference the Cart checkout `complete_cart` step
            (`POST /api/checkout/v2026-04/carts/{token}/complete`, Checkout endpoints
            reference) consumes as its `payment_uuid` query parameter.
        meta:
          "$ref": "#/components/schemas/Meta"
    PaypalAuthorizeOrderResponse:
      description: Success body for PayPal order authorization.
      type: object
      additionalProperties: false
      required:
      - success
      - order_id
      - authorization_id
      - meta
      properties:
        success:
          type: boolean
          description: '`true` when the PayPal order was authorized.'
        order_id:
          type: string
          description: PayPal order id that was authorized.
        authorization_id:
          type: string
          description: PayPal authorization id for the authorized funds.
        meta:
          "$ref": "#/components/schemas/Meta"
    PaypalShippingChangeResponse:
      description: Success body for the PayPal shipping address change callback.
      type: object
      additionalProperties: false
      required:
      - success
      - order_id
      - meta
      properties:
        success:
          type: boolean
          description: '`true` when the shipping change was applied and the PayPal
            order was patched.'
        order_id:
          type: string
          description: PayPal order id that was patched with the recalculated
            totals.
        meta:
          "$ref": "#/components/schemas/Meta"
    BraintreeClientTokenResponse:
      description: Success body for the Braintree client token.
      type: object
      additionalProperties: false
      required:
      - client_token
      - paypal_enabled
      - meta
      properties:
        client_token:
          type: string
          description: Braintree client token used to initialize the Braintree JS
            SDK in the browser for this cart.
        paypal_enabled:
          type: boolean
          description: '`true` when PayPal funding is available through the resolved
            Braintree account.'
        meta:
          "$ref": "#/components/schemas/Meta"
    BraintreePayResponse:
      description: Success body for a Braintree authorization.
      type: object
      additionalProperties: false
      required:
      - transaction_id
      - payment_type
      - meta
      properties:
        transaction_id:
          type: string
          description: Braintree transaction id for the authorized charge; the vault
            context is stored on the cart and the PaymentMethod is created later via
            the payment_method endpoint.
        payment_type:
          type: string
          description: Detected payment type (e.g. braintree_paypal, venmo).
        meta:
          "$ref": "#/components/schemas/Meta"
    KlarnaCreateSessionResponse:
      description: Success body for Klarna session creation.
      type: object
      additionalProperties: false
      required:
      - success
      - session_id
      - client_token
      - meta
      properties:
        success:
          type: boolean
          description: '`true` when the Klarna session was created.'
        session_id:
          type:
          - string
          - 'null'
          description: Klarna session id, reused on the update endpoint; `null` when
            Klarna returned no session.
        client_token:
          type:
          - string
          - 'null'
          description: Klarna client token used to render the Klarna payment widget
            in the browser; `null` when Klarna returned none.
        meta:
          "$ref": "#/components/schemas/Meta"
    KlarnaUpdateSessionResponse:
      description: Success body for Klarna session update.
      type: object
      additionalProperties: false
      required:
      - success
      - meta
      properties:
        success:
          type: boolean
          description: '`true` when the Klarna session was refreshed against the
            cart.'
        meta:
          "$ref": "#/components/schemas/Meta"
    ApplePaySessionResponse:
      description: Success body for Apple Pay merchant validation. apple_pay is
        Apple's raw startSession response body as a JSON-encoded string.
      type: object
      additionalProperties: false
      required:
      - apple_pay
      - meta
      properties:
        apple_pay:
          type: string
          description: Apple's raw `startSession` response body, passed through as a
            JSON-encoded string for the browser to hand to the Apple Pay session.
        meta:
          "$ref": "#/components/schemas/Meta"
    ApplePayFailureResponse:
      description: Discriminated Apple Pay session failure (422). error_code is
        the machine-readable discriminator; error_message is customer-facing copy.
      type: object
      additionalProperties: false
      required:
      - error_code
      - error_message
      - errors
      - meta
      properties:
        error_code:
          type: string
          description: Machine-readable discriminator for the Apple Pay failure,
            used to branch on the specific cause.
        error_message:
          type: string
          description: Customer-facing copy describing the Apple Pay failure.
        errors:
          "$ref": "#/components/schemas/ErrorBag"
        meta:
          "$ref": "#/components/schemas/Meta"
paths:
  "/api/payments/v2026-04/carts/{cart_token}/payment_method":
    put:
      summary: Set the cart payment method
      description: Sets the payment method on the cart (idempotent). The request
        and response shapes vary by payment type. The declared contract requires
        type; the saved-payment-method flow (payment_method_id) is the only flow
        that may omit payment_method.
      tags:
      - payments
      operationId: payments_v2026_04_set_payment_method
      parameters:
      - name: cart_token
        in: path
        required: true
        description: |
          Opaque cart token returned by the create-cart response. It scopes the
          request to a single cart and is the credential for these endpoints —
          cart-token authentication carried in the path, with no bearer token or API
          key.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - type
              properties:
                type:
                  type: string
                  description: Payment type (credit_card, paypal, apple_pay,
                    klarna, bread, affirm, or a platform type such as *_citcon,
                    *_ppro, *_dlocal).
                payment_method:
                  type: object
                  additionalProperties:
                    "$ref": "#/components/schemas/JsonValue"
                  description: Type-specific payment payload (e.g. VGS card
                    fields for credit_card; order_id/token for paypal;
                    authorization_token/session_id for klarna).
                billing_address:
                  type: object
                  additionalProperties: false
                  description: Optional billing address. All fields are optional.
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    address1:
                      type: string
                    address2:
                      type:
                      - string
                      - 'null'
                    city:
                      type: string
                    state:
                      type: string
                    postal_code:
                      type: string
                    country_code:
                      type: string
                payment_account:
                  type:
                  - string
                  - 'null'
                  description: PaymentAccount UUID override for routing.
                customer_details:
                  type:
                  - object
                  - 'null'
                  additionalProperties:
                    "$ref": "#/components/schemas/JsonValue"
                  description: Integration-specific customer details.
                device_data:
                  type:
                  - string
                  - 'null'
                  description: Braintree Data Collector fraud fingerprint.
                use_customer_payment_method:
                  type: boolean
                  description: Resolve payment_method_id against the customer's
                    saved payment methods instead of the shared wallet.
                payment_method_id:
                  type:
                  - integer
                  - string
                  description: Existing saved PaymentMethod id (saved payment
                    method flow).
                jwt:
                  type: string
                  description: Customer/user JWT authorizing use of a saved
                    payment method (may also be sent as an Authorization header).
                token:
                  type: object
                  additionalProperties:
                    "$ref": "#/components/schemas/JsonValue"
                  description: Raw Apple Pay payment token envelope (apple_pay
                    flow).
                apple_pay_token:
                  type: object
                  additionalProperties:
                    "$ref": "#/components/schemas/JsonValue"
                  description: VGS-decrypted Apple Pay token data (apple_pay
                    flow, inbound VGS route).
                payment_type:
                  type: string
                  description: Secondary payment-type selector. When set to
                    "paypal" on an apple_pay request, routes the decrypted
                    Apple Pay token through the PayPal-on-Apple-Pay flow.
            examples:
              credit_card:
                summary: Credit card tokenized via VGS
                value:
                  type: credit_card
                  payment_method:
                    vgs_card_id: card_9f8e7d6c
                  billing_address:
                    name: Ada Lovelace
                    address1: 1 Analytical Way
                    city: London
                    state: LDN
                    postal_code: EC1A 1BB
                    country_code: GB
              saved_payment_method:
                summary: Reuse a customer's saved payment method
                value:
                  type: credit_card
                  payment_method_id: 4412
                  use_customer_payment_method: true
      responses:
        '201':
          description: Payment method set
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/SetPaymentMethodResponse"
              examples:
                credit_card:
                  summary: Stored card returned for a credit_card flow
                  value:
                    card:
                      id: 88123
                      brand: visa
                      last_four: '4242'
                      exp_month: 12
                      exp_year: 2030
                paypal:
                  summary: PayPal order id returned for a paypal flow
                  value:
                    order_id: 5O190127TN364715T
        '404':
          description: Cart, payment, or saved payment method not found
          content:
            application/json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/ErrorResponse"
                - "$ref": "#/components/schemas/BareErrorResponse"
        '410':
          description: Cart already processed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProcessedCartResponse"
        '422':
          description: Unprocessable entity
          content:
            application/json:
              schema:
                oneOf:
                - "$ref": "#/components/schemas/ErrorResponse"
                - "$ref": "#/components/schemas/BareErrorResponse"
      security: []
  "/api/payments/v2026-04/carts/{cart_token}/tokenize":
    post:
      summary: Provision VGS vault credentials
      description: |
        Resolves the CreditCard payment account for the cart, pins the routing
        decision on the cart, and returns the VGS Collect vault credentials used to
        tokenize card data client-side. No request body. This begins the card
        payment flow: after tokenizing the card (and completing 3D Secure via
        `verify` when the returned `requires_3ds` is `true`) the server produces a
        Fluid payment reference that the Cart checkout `complete_cart` step
        (`POST /api/checkout/v2026-04/carts/{token}/complete`, Checkout endpoints
        reference) consumes as its `payment_uuid` query parameter. Cart-token
        authenticated. Returns `404` when the cart or payment account is not found
        and `410` when the cart has already been processed.
      tags:
      - payments
      operationId: payments_v2026_04_tokenize
      parameters:
      - name: cart_token
        in: path
        required: true
        description: |
          Opaque cart token returned by the create-cart response. It scopes the
          request to a single cart and is the credential for these endpoints —
          cart-token authentication carried in the path, with no bearer token or API
          key.
        schema:
          type: string
      responses:
        '200':
          description: Vault credentials
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/TokenizeResponse"
              examples:
                vault:
                  summary: VGS vault credentials for client-side tokenization
                  value:
                    vault:
                      vault_id: tntabc123
                      environment: sandbox
                      route_id: rt_9x8y7z
                      mode: preflight
                      requires_3ds: false
                    requires_3ds: false
                    payment_account_id: 4021
                    meta:
                      request_id: 018f2c1a-8b3a-7e6d-9f10-2a3b4c5d6e7f
                      timestamp: '2026-04-01T12:00:00Z'
        '404':
          description: Cart or payment account not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '410':
          description: Cart already processed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProcessedCartResponse"
      security: []
  "/api/payments/v2026-04/carts/{cart_token}/verify":
    post:
      summary: Initialize 3DS verification
      description: |
        Starts 3D Secure device fingerprinting for the cart's payment method and
        returns the 3DS method content and the merchant transaction id for the
        attempt. This is the `requires_3ds` branch of the card payment flow (see
        `tokenize`): completing it authorizes the card and yields the Fluid payment
        reference the Cart checkout `complete_cart` step consumes as its
        `payment_uuid` query parameter (see the Checkout endpoints reference).
        Cart-token authenticated. Returns `404` when the cart is not found, `410`
        when the cart has already been processed, and `422` when 3DS is not
        required, not configured, already in progress, or the card is not
        registered.
      tags:
      - payments
      operationId: payments_v2026_04_verify
      parameters:
      - name: cart_token
        in: path
        required: true
        description: |
          Opaque cart token returned by the create-cart response. It scopes the
          request to a single cart and is the credential for these endpoints —
          cart-token authentication carried in the path, with no bearer token or API
          key.
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                vgs_card_id:
                  type:
                  - string
                  - 'null'
                  description: VGS card id fallback; primarily resolved from the
                    cart's payment method.
            examples:
              default:
                summary: Initialize 3DS using the cart's stored card
                value: {}
              vgs_card_id:
                summary: Initialize 3DS with an explicit VGS card id
                value:
                  vgs_card_id: card_9f8e7d6c
      responses:
        '200':
          description: 3DS initialized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/VerifyResponse"
              examples:
                initialized:
                  summary: 3DS device fingerprinting initialized
                  value:
                    tds_method_content: PGh0bWw+Li4uPC9odG1sPg==
                    merchant_tx_id: 018f2c1a-8b3a-7e6d-9f10-2a3b4c5d6e7f
                    fingerprinting_required: true
                    meta:
                      request_id: 018f2c1a-8b3a-7e6d-9f10-2a3b4c5d6e7f
                      timestamp: '2026-04-01T12:00:00Z'
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '410':
          description: Cart already processed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProcessedCartResponse"
        '422':
          description: 3DS not required, not configured, already in progress, or
            card not registered
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      security: []
  "/api/payments/v2026-04/carts/{cart_token}/paypal/token":
    get:
      summary: Get PayPal client SDK token
      description: |
        Returns the PayPal client SDK token the browser uses to initialize the
        PayPal JS SDK for this cart. The token is scoped to the PayPal
        `PaymentAccount` named by `payment_account_id`. Cart-token authenticated
        (the token in the path is the credential; no bearer token). Returns `422`
        when `payment_account_id` is missing or the merchant's PayPal account is not
        configured, `404` when the cart or payment account is not found, and `410`
        when the cart has already been processed.
      tags:
      - paypal
      operationId: payments_v2026_04_paypal_client_token
      parameters:
      - name: cart_token
        in: path
        required: true
        description: |
          Opaque cart token returned by the create-cart response. It scopes the
          request to a single cart and is the credential for these endpoints —
