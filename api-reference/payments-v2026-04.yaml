      description: |
        Creates a PayPal order for the cart and returns its `order_id` for the
        client SDK to approve. Supplying `payment_token_id` switches the request to
        the Fastlane capture flow, which additionally returns `authorization_id` and
        a `payment_uuid` — the Fluid payment reference carried into the Cart checkout
        `complete_cart` step (`POST /api/checkout/v2026-04/carts/{token}/complete`,
        Checkout endpoints reference) as its `payment_uuid` query parameter.
        Cart-token authenticated. Returns `422` for invalid parameters, a
        zero-amount cart, or unsupported recurring Apple Pay; `404` when the cart is
        not found; and `410` when the cart has already been processed.
      tags:
      - paypal
      operationId: payments_v2026_04_paypal_create_order
      parameters:
      - name: cart_token
        in: path
        required: true
        description: |
          Opaque cart token returned by the create-cart response. It scopes the
          request to a single cart and is the credential for these endpoints —
          cart-token authentication carried in the path, with no bearer token or API
          key.
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
              - funding_source
              - is_pay_later
              properties:
                funding_source:
                  type: string
                  description: PayPal funding source (e.g. paypal, Venmo,
                    apple_pay).
                is_pay_later:
                  type: boolean
                payment_token_id:
                  type: string
                  description: Fastlane single-use payment token; presence
                    switches the order to the Fastlane capture flow.
                is_app_switch:
                  type: boolean
            examples:
              standard:
                summary: Standard PayPal order
                value:
                  funding_source: paypal
                  is_pay_later: false
              fastlane:
                summary: Fastlane order (single-use payment token)
                value:
                  funding_source: paypal
                  is_pay_later: false
                  payment_token_id: tok_9f8e7d6c
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/PaypalCreateOrderResponse"
              examples:
                created:
                  summary: PayPal order created
                  value:
                    success: true
                    order_id: 5O190127TN364715T
                    meta:
                      request_id: 018f2c1a-8b3a-7e6d-9f10-2a3b4c5d6e7f
                      timestamp: '2026-04-01T12:00:00Z'
        '404':
          description: Cart not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
        '410':
          description: Cart already processed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ProcessedCartResponse"
        '422':
          description: Invalid parameters, zero-amount cart, or unsupported
            recurring Apple Pay
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/ErrorResponse"
      security: []
